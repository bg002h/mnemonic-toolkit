# Pinned upstream tags for the mnemonic-gui user manual v1.0.
#
# This file is read by:
#   - tests/lint.sh::gui-schema-coverage (verifies the rendered HTML's
#     anchors match the SubcommandSchema in mnemonic-gui at the pinned
#     tag).
#   - .github/workflows/manual-gui.yml (clones the pinned mnemonic-gui
#     ref before running lint).
#
# The four CLI-tag fields below mirror exactly what the pinned
# mnemonic-gui tag (above) pins in its own pinned-upstream.toml
# [mnemonic]/[md]/[ms]/[mk] tables. A cycle bumping the GUI tag must
# re-pin all four in lockstep. Verified for mnemonic-gui-v0.55.0
# (hint-text-defaults cycle): the GUI at that tag pins
# mnemonic-toolkit-v0.74.0 (Cargo.toml [dependencies] +
# pinned-upstream.toml [mnemonic] table), descriptor-mnemonic-md-cli-v0.11.0,
# ms-cli-v0.13.0, mk-cli-v0.11.0 (its pinned-upstream.toml schema-mirror
# map) — IDENTICAL to v0.54.0's, so the four fields below are unchanged.
# The v0.54.0 -> v0.55.0 bump changes no CLI surface and no flag
# name/kind/enum (schema-coverage anchor set unchanged at 982/61); the
# delta is the hint_text ghost fix for schema-defaulted Text/Path fields
# (SPEC_gui_hint_text_defaults.md): 6 of the 61 forms change — the
# defaulted field renders EMPTY with the default as a dimmed ghost
# (`<hint:…>` in the structural renders), so 6 .gui transcripts + 6
# figures/gui/ PNGs re-pin against the tag's tests/snapshots/forms/
# corpus (verify-figures-gui lint phase 9).
#
# Source-path resolution for the lint:
#   $MANUAL_GUI_UPSTREAM_ROOT override env var, OR sibling-checkout
#   default `../mnemonic-gui` relative to docs/manual-gui/.

[mnemonic-gui]
tag = "mnemonic-gui-v0.55.0"

[manual-gui]
toolkit-tag-implied = "mnemonic-toolkit-v0.74.0"
md-cli-tag-implied  = "descriptor-mnemonic-md-cli-v0.11.0"
ms-cli-tag-implied  = "ms-cli-v0.13.0"
mk-cli-tag-implied  = "mk-cli-v0.11.0"
