# Pinned upstream tags for the mnemonic-gui user manual v1.0.
#
# This file is read by:
#   - tests/lint.sh::gui-schema-coverage (verifies the rendered HTML's
#     anchors match the SubcommandSchema in mnemonic-gui at the pinned
#     tag).
#   - .github/workflows/manual-gui.yml (clones the pinned mnemonic-gui
#     ref before running lint).
#
# The four CLI-tag fields below mirror exactly what the pinned
# mnemonic-gui tag (above) pins in its own pinned-upstream.toml
# [mnemonic]/[md]/[ms]/[mk] tables. A cycle bumping the GUI tag must
# re-pin all four in lockstep. Verified for mnemonic-gui-v0.55.0
# (hint-text-defaults cycle): the GUI at that tag pins
# mnemonic-toolkit-v0.74.0 (Cargo.toml [dependencies] +
# pinned-upstream.toml [mnemonic] table), descriptor-mnemonic-md-cli-v0.11.0,
# ms-cli-v0.13.0, mk-cli-v0.11.0 (its pinned-upstream.toml schema-mirror
# map) — IDENTICAL to v0.54.0's, so the four fields below are unchanged.
# The v0.54.0 -> v0.55.0 bump changes no CLI surface and no flag
# name/kind/enum (schema-coverage anchor set unchanged at 982/61); the
# delta is the hint_text ghost fix for schema-defaulted Text/Path fields
# (SPEC_gui_hint_text_defaults.md): 6 of the 61 forms change — the
# defaulted field renders EMPTY with the default as a dimmed ghost
# (`<hint:…>` in the structural renders), so 6 .gui transcripts + 6
# figures/gui/ PNGs re-pin against the tag's tests/snapshots/forms/
# corpus (verify-figures-gui lint phase 9).
#
# v0.55.0 -> v0.56.0 (gui_example tutorial cycle, Leg 2 / P2): the GUI
# tag bumps to mnemonic-gui-v0.56.0, which pins mnemonic-toolkit-v0.75.0
# (toolkit-tag-implied below bumps to match; VERIFIED against the tag's
# own pinned-upstream.toml [mnemonic].tag). md/ms/mk are pin-NEUTRAL at
# v0.56.0 — the tag's [md]/[ms]/[mk] tables still read
# descriptor-mnemonic-md-cli-v0.11.0 / ms-cli-v0.13.0 / mk-cli-v0.11.0
# (VERIFIED), so those three fields are unchanged. The only CLI-surface
# delta is F1: the GUI-render-scoped export-wallet `--template` unset
# affordance (a per-flag EXPORT_WALLET_TEMPLATES const APPENDING the
# empty-string sentinel, rendered `(none)`; opts[0] stays `bip44`). It
# re-pins EXACTLY ONE structural render — transcripts/gui/mnemonic-export-wallet.gui
# (`--template … dropdown[…,tr-sortedmulti-a,(none)] -> bip44`, regenerated
# by verify-examples-gui) — and adds one manual section
# (`### (none) {#mnemonic-export-wallet-template-}` in
# src/40-mnemonic/45-export-wallet.md) so gui-schema-coverage's
# per-variant anchor stays satisfied; the 61-form gallery PNGs are
# UNCHANGED (closed-form render, popup contents not depicted). This same
# pin ALSO anchors the NEW tutorial corpus (figures/tutorial/ 50 PNGs +
# transcripts/tutorial/ run transcripts), byte-compared against the tag's
# tests/snapshots/tutorial/ by lint phases 10-11 (single coherent bump —
# form gallery + .gui renders + tutorial corpus move in lockstep).
#
# v0.56.0 -> v0.57.0 (tutorial-surfaced-fixes batch, Leg 2 / P2): the
# GUI tag bumps to mnemonic-gui-v0.57.0. It is PIN-NEUTRAL — the tag's
# own pinned-upstream.toml + Cargo.toml still pin
# mnemonic-toolkit-v0.75.0 / descriptor-mnemonic-md-cli-v0.11.0 /
# ms-cli-v0.13.0 / mk-cli-v0.11.0 (VERIFIED against the tag clone), so
# the four *-tag-implied fields below are unchanged; the GUI's
# schema-mirror job runs against the identical toolkit binary. Two
# user-visible deltas ride the bump: (1) the secret-field reveal (eye)
# toggle — a display-only hold-to-reveal / bounded-latch affordance that
# adds a strictly-ASCII ` [reveal]` marker to the 28 masked-on-load
# secret rows in the structural renders (28 .gui re-pin) and eye chrome
# to 32 gallery PNGs (the 28 <masked>-emit forms plus 4 composite
# default-argv-secret forms final-word/seed-xor-split/seedqr-encode/
# ms-shares-split whose masked value field shows an eye on load, no .gui
# delta); (2) the restore `--template` `(none)` unset affordance (the F1
# mirror — a render-scoped RESTORE_TEMPLATES const appending the
# empty-string sentinel; re-pins mnemonic-restore.gui's --template row,
# which ALSO carries the reveal marker on its --passphrase row). The
# tutorial corpus re-drives once: 26 of the 50 figures/tutorial/ PNGs
# move (4 reveal-plaintext + 10 restore `(none)` + 12 eye-chrome);
# transcripts/tutorial/ are BYTE-IDENTICAL (reveal is display-only,
# `(none)` drops an inert flag — a gated transcript invariant). The
# restore `(none)` variant adds one manual section
# (`### (none) {#mnemonic-restore-template-}` in
# src/40-mnemonic/4d-restore.md) so gui-schema-coverage's per-variant
# anchor stays satisfied.
#
# Source-path resolution for the lint:
#   $MANUAL_GUI_UPSTREAM_ROOT override env var, OR sibling-checkout
#   default `../mnemonic-gui` relative to docs/manual-gui/.

[mnemonic-gui]
tag = "mnemonic-gui-v0.57.0"

[manual-gui]
toolkit-tag-implied = "mnemonic-toolkit-v0.75.0"
md-cli-tag-implied  = "descriptor-mnemonic-md-cli-v0.11.0"
ms-cli-tag-implied  = "ms-cli-v0.13.0"
mk-cli-tag-implied  = "mk-cli-v0.11.0"
