# Pinned upstream tags for the mnemonic-gui user manual v1.0.
#
# This file is read by:
#   - tests/lint.sh::gui-schema-coverage (verifies the rendered HTML's
#     anchors match the SubcommandSchema in mnemonic-gui at the pinned
#     tag).
#   - .github/workflows/manual-gui.yml (clones the pinned mnemonic-gui
#     ref before running lint).
#
# The four CLI-tag fields below mirror exactly what the pinned
# mnemonic-gui tag (above) pins in its own pinned-upstream.toml
# [mnemonic]/[md]/[ms]/[mk] tables. A cycle bumping the GUI tag must
# re-pin all four in lockstep. Re-pinned for mnemonic-gui-v0.49.0
# (Cycle-C manual-gui v1.1 modernization): the GUI at that tag pins
# mnemonic-toolkit-v0.70.0 (Cargo.toml [dependencies] + pinned-upstream.toml
# [mnemonic] table), descriptor-mnemonic-md-cli-v0.7.0, ms-cli-v0.8.0,
# mk-cli-v0.9.0 (its pinned-upstream.toml schema-mirror map).
#
# Source-path resolution for the lint:
#   $MANUAL_GUI_UPSTREAM_ROOT override env var, OR sibling-checkout
#   default `../mnemonic-gui` relative to docs/manual-gui/.

[mnemonic-gui]
tag = "mnemonic-gui-v0.49.0"

[manual-gui]
toolkit-tag-implied = "mnemonic-toolkit-v0.70.0"
md-cli-tag-implied  = "descriptor-mnemonic-md-cli-v0.7.0"
ms-cli-tag-implied  = "ms-cli-v0.8.0"
mk-cli-tag-implied  = "mk-cli-v0.9.0"
