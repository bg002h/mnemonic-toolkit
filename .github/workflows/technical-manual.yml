name: technical-manual

# Lint-only CI for the m-format TECHNICAL manual. Single-repo (toolkit) by
# design — `make lint` is binary-independent (markdownlint/cspell/lychee scan
# source text; api-surface-coverage is warning-only and reads lib.rs/format.rs;
# figures-cache-verify is render-free). symbol-ref-check enforces G1 (line-ref
# ban) on all chapters + G2 (symbol existence) for refs resolvable in the
# present (toolkit) repo; G2 for any ref whose file is unresolvable here —
# codec files in absent siblings — skip gracefully in bare CI (codec-G2 is
# enforced only by local `make lint` with all siblings present). Toolkit-G2 is
# airtight here: the trigger also fires on crates/mnemonic-toolkit/{src,tests}
# so a toolkit-symbol rename re-runs symbol-ref-check, and a non-authoritative
# chapter must fully-qualify toolkit refs (the `unqualified-toolkit` gate) so
# they FAIL-on-rename rather than skip.
#
# `paths` filters apply only to branch pushes / PRs; tag pushes matching
# `tech-manual-v*` always trigger the workflow regardless of which files are in
# the tag's commit. This is intentional — the release-asset upload step needs to
# run on every tag push. Mirrors manual.yml's manual-v* PDF release: the
# frontmatter (src/00-frontmatter.md) and release-history appendix promise the
# rendered build/m-format-technical-manual.pdf ships as a GitHub release asset
# under the tech-manual-vX.Y.Z tag.

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/technical-manual/**'
      - 'docs/tools/render-mermaid-cache.py'
      - '.github/workflows/technical-manual.yml'
      # Toolkit source: a rename of a cited symbol breaks a `file.rs::symbol`
      # citation; fire so symbol-ref-check re-runs (toolkit-G2 in bare CI).
      - 'crates/mnemonic-toolkit/src/**'
      - 'crates/mnemonic-toolkit/tests/**'
    tags:
      - 'tech-manual-v*'
  pull_request:
    paths:
      - 'docs/technical-manual/**'
      - 'docs/tools/render-mermaid-cache.py'
      - '.github/workflows/technical-manual.yml'
      # Toolkit source: a rename of a cited symbol breaks a `file.rs::symbol`
      # citation; fire so symbol-ref-check re-runs (toolkit-G2 in bare CI).
      - 'crates/mnemonic-toolkit/src/**'
      - 'crates/mnemonic-toolkit/tests/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        # Default checkout (NO `path:`): GitHub nests the repo at
        # $GITHUB_WORKSPACE = .../work/<repo>/<repo>, so symbol-ref-check's
        # WS-derivation (4 dirs up from src/) lands on .../work/<repo>, and
        # REPO_ROOTS[toolkit] = WS/mnemonic-toolkit/crates/mnemonic-toolkit
        # resolves to the checkout. A `path:` override would break this.
        uses: actions/checkout@v6

      - name: Install make
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends make

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install npm lint tools
        run: |
          npm install -g \
            markdownlint-cli2@^0.13 \
            cspell@^8

      - name: Install lychee
        run: |
          LARCH=x86_64-unknown-linux-gnu
          curl -fsSL "https://github.com/lycheeverse/lychee/releases/download/lychee-v0.24.2/lychee-${LARCH}.tar.gz" \
            | sudo tar -xz --strip-components=1 -C /usr/local/bin "lychee-${LARCH}/lychee"
          sudo chmod +x /usr/local/bin/lychee

      - name: Lint technical manual
        working-directory: docs/technical-manual
        # *_BIN=true: the `make lint` path never INVOKES a binary —
        # api-surface-coverage reads lib.rs/format.rs source directly and
        # ignores these vars, symbol-ref-check ignores them. `=true` is
        # belt-and-suspenders against the Makefile's default `cargo run ...`
        # so no accidental compile can be triggered. A non-zero `make lint`
        # fails the job.
        run: |
          make lint \
            MNEMONIC_BIN=true \
            MD_BIN=true \
            MS_BIN=true \
            MK_BIN=true

      # ---- Real-bin output-fidelity gate (mirrors manual.yml's audit step) ----
      # Cycle C P1a: the 15 technical-manual goldens (11 CLI + 4 cargo-example)
      # are now CI-replayed against the CURRENT-release-tier pins. `make lint`
      # above stays binary-independent; this adds the binary-dependent
      # `verify-examples` leg the old workflow stubbed out with `=true`.
      - name: Install mk-cli
        # Package-name selector (multi-binary workspace; --bin refuses
        # disambig). Current-release tier pin — mirrors manual.yml:79.
        run: cargo install --git https://github.com/bg002h/mnemonic-key --tag mk-cli-v0.12.0 mk-cli

      - name: Install md-cli
        # `--features cli-compiler` matches scripts/install.sh's component pin
        # (the technical-manual md1 transcripts exercise the compiler path).
        run: cargo install --git https://github.com/bg002h/descriptor-mnemonic --tag descriptor-mnemonic-md-cli-v0.11.2 md-cli --features cli-compiler

      - name: Install ms-cli
        run: cargo install --git https://github.com/bg002h/mnemonic-secret --tag ms-cli-v0.14.1 ms-cli

      - name: Build mnemonic binary (debug)
        # Debug binary is sufficient for transcript-replay byte comparison.
        run: cargo build --bin mnemonic

      - name: Pre-build cargo-example targets (md-codec-examples)
        # The 4 api-roundtrip transcripts run `cargo run --manifest-path
        # $EXAMPLES_DIR/Cargo.toml --example …`; pre-building keeps the first
        # replay from emitting compile chatter into the captured output.
        working-directory: docs/technical-manual/examples
        run: cargo build --examples

      - name: Verify technical-manual examples (real current-tier bins)
        working-directory: docs/technical-manual
        # MD/MS/MK resolve via $PATH to the cargo-installed ~/.cargo/bin
        # binaries above (no md→mkdir alias in CI). EXAMPLES_DIR is absolute so
        # the per-cmd mktemp -d cwd resolves the cargo manifest. All flag
        # values are constants / controlled built-ins ($GITHUB_WORKSPACE).
        run: |
          make verify-examples \
            MNEMONIC_BIN="$GITHUB_WORKSPACE/target/debug/mnemonic" \
            MD_BIN=md \
            MS_BIN=ms \
            MK_BIN=mk \
            EXAMPLES_DIR="$GITHUB_WORKSPACE/docs/technical-manual/examples"

      # ---- PDF render + release asset (mirrors manual.yml's manual-v* path) ----
      # The build + Verify + upload-artifact steps run on every workflow trigger
      # (push / PR / tag); only the two release steps are tag-gated. The frontmatter
      # promises build/m-format-technical-manual.pdf ships under tech-manual-vX.Y.Z.
      - name: Install pandoc + texlive
        # No chromium / mermaid-filter: the build runs MERMAID_FILTER=skip
        # (the Makefile default) and consumes the checked-in figures/cache/.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-extra-utils \
            make

      - name: Build PDF
        # MERMAID_FILTER=skip is the Makefile default; explicit here for
        # clarity. The build consumes the checked-in figures/cache/.
        working-directory: docs/technical-manual
        run: make pdf MERMAID_FILTER=skip

      - name: Verify PDF
        working-directory: docs/technical-manual
        run: test -f build/m-format-technical-manual.pdf && ls -lh build/m-format-technical-manual.pdf

      - name: Build HTML
        # Self-contained pandoc --standalone render (embedded CSS); opens in
        # any browser with no server — the no-PDF-viewer release asset.
        working-directory: docs/technical-manual
        run: make html MERMAID_FILTER=skip

      - name: Verify HTML
        working-directory: docs/technical-manual
        run: test -f build/m-format-technical-manual.html && ls -lh build/m-format-technical-manual.html

      - name: Upload PDF as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: m-format-technical-manual-pdf
          path: docs/technical-manual/build/m-format-technical-manual.pdf

      - name: Upload HTML as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: m-format-technical-manual-html
          path: docs/technical-manual/build/m-format-technical-manual.html

      - name: Ensure GitHub release exists for this tag
        if: startsWith(github.ref, 'refs/tags/tech-manual-v')
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$REF_NAME" >/dev/null 2>&1; then
            gh release create "$REF_NAME" --title "$REF_NAME" --generate-notes || true
          fi

      - name: Upload PDF to release (on tech-manual-v* tag)
        if: startsWith(github.ref, 'refs/tags/tech-manual-v')
        env:
          REF_NAME: ${{ github.ref_name }}
        working-directory: docs/technical-manual
        run: gh release upload "$REF_NAME" build/m-format-technical-manual.pdf --clobber

      - name: Upload HTML to release (on tech-manual-v* tag)
        if: startsWith(github.ref, 'refs/tags/tech-manual-v')
        env:
          REF_NAME: ${{ github.ref_name }}
        working-directory: docs/technical-manual
        run: gh release upload "$REF_NAME" build/m-format-technical-manual.html --clobber
