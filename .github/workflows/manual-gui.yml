name: manual-gui

# `paths` filters apply only to branch pushes / PRs; tag pushes
# matching `manual-gui-v*` always trigger the workflow regardless of
# which files are in the tag's commit. This is intentional — the
# release-asset upload + gh-pages publish steps must run on every
# tag push.

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/manual-gui/**'
      - '.github/workflows/manual-gui.yml'
    tags:
      - 'manual-gui-v*'
  pull_request:
    paths:
      - 'docs/manual-gui/**'
      - '.github/workflows/manual-gui.yml'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — lint
  #
  # Runs the 7-phase `make lint` against a fresh `make html` build (phase 4
  # reads from the built HTML for the bidirectional schema-coverage check).
  # Clones `mnemonic-gui` at the pinned tag from pinned-upstream.toml so the
  # schema-coverage check operates against the exact source the manual was
  # authored against.
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout toolkit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read pinned mnemonic-gui tag
        id: pin
        working-directory: docs/manual-gui
        run: |
          tag=$(grep -oE 'tag = "mnemonic-gui-v[^"]+"' pinned-upstream.toml \
                  | head -1 \
                  | sed -E 's/tag = "(.*)"/\1/')
          if [ -z "$tag" ]; then
            echo "ERROR: could not parse mnemonic-gui tag from pinned-upstream.toml" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Pinned mnemonic-gui tag: $tag"

      - name: Clone mnemonic-gui at pinned tag
        env:
          PINNED_TAG: ${{ steps.pin.outputs.tag }}
        run: |
          git clone --depth 1 --branch "$PINNED_TAG" \
            https://github.com/bg002h/mnemonic-gui.git \
            "$RUNNER_TEMP/mnemonic-gui-pinned"
          echo "MANUAL_GUI_UPSTREAM_ROOT=$RUNNER_TEMP/mnemonic-gui-pinned" \
            >> "$GITHUB_ENV"

      - name: Install pandoc + texlive
        # texlive-science brings seqsplit (preamble.tex's \brktt for long
        # monospace identifiers); xurl ships with texlive-latex-recommended
        # (URL line-breaking). Mirrors docs/manual/Dockerfile.build:30-46.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-extra-utils \
            texlive-science \
            make \
            python3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm lint tools
        run: |
          npm install -g \
            markdownlint-cli2@^0.13 \
            cspell@^8

      - name: Install lychee
        run: |
          LARCH=x86_64-unknown-linux-gnu
          curl -fsSL "https://github.com/lycheeverse/lychee/releases/download/lychee-v0.24.2/lychee-${LARCH}.tar.gz" \
            | sudo tar -xz --strip-components=1 -C /usr/local/bin "lychee-${LARCH}/lychee"
          sudo chmod +x /usr/local/bin/lychee

      - name: Build HTML (lint phase 4 reads this)
        working-directory: docs/manual-gui
        run: make html

      - name: Lint
        working-directory: docs/manual-gui
        run: make lint MNEMONIC_BIN=true MD_BIN=true MS_BIN=true MK_BIN=true

  # ---------------------------------------------------------------------------
  # Job 2 — build
  #
  # Runs `make pdf` + `make html` and uploads the PDF as a workflow artifact.
  # Required on PR (regression detection) and on tag push (the artifact is
  # consumed by the release job below).
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout toolkit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pandoc + texlive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-extra-utils \
            texlive-science \
            make

      - name: Build PDF + HTML
        working-directory: docs/manual-gui
        run: |
          make pdf
          make html

      - name: Verify build artifacts
        working-directory: docs/manual-gui
        run: |
          test -f build/m-format-gui-manual.pdf
          test -f build/m-format-gui-manual.html
          ls -lh build/m-format-gui-manual.pdf build/m-format-gui-manual.html

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: m-format-gui-manual-pdf
          path: docs/manual-gui/build/m-format-gui-manual.pdf

      - name: Upload HTML artifact
        # Required by the release job (gh-pages publish step).
        uses: actions/upload-artifact@v4
        with:
          name: m-format-gui-manual-html
          path: docs/manual-gui/build/m-format-gui-manual.html

  # ---------------------------------------------------------------------------
  # Job 3 — release  (tag push only)
  #
  # Runs ONLY on `manual-gui-v*` tag pushes. Depends on `build` (downloads
  # the PDF + HTML artifacts), creates the GitHub release with CHANGELOG.md
  # notes, attaches the PDF as a release asset, and publishes the HTML to
  # the `gh-pages` branch under `/manual-gui/` so help-icon deep links
  # resolve.
  #
  # Pages MUST be enabled on the repo before the first tag push (one-time
  # bootstrap per PE.5 in the cycle plan; the deployed branch otherwise
  # exists but resolves to 404).
  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/manual-gui-v')
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REF_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout toolkit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: m-format-gui-manual-pdf
          path: docs/manual-gui/build/

      - name: Download HTML artifact
        uses: actions/download-artifact@v4
        with:
          name: m-format-gui-manual-html
          path: docs/manual-gui/build/

      - name: Ensure GitHub release exists for this tag
        working-directory: docs/manual-gui
        run: |
          if ! gh release view "$REF_NAME" >/dev/null 2>&1; then
            if [ -f CHANGELOG.md ]; then
              gh release create "$REF_NAME" --title "$REF_NAME" --notes-file CHANGELOG.md
            else
              gh release create "$REF_NAME" --title "$REF_NAME" --generate-notes
            fi
          fi

      - name: Upload PDF asset to release
        working-directory: docs/manual-gui
        run: gh release upload "$REF_NAME" build/m-format-gui-manual.pdf --clobber

      - name: Configure git for gh-pages push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish HTML to gh-pages branch under /manual-gui/
        # Creates a fresh worktree on `gh-pages` and drops the HTML at
        # `manual-gui/index.html`. The GUI's help-icon URLs hardcode the
        # directory form `https://bg002h.github.io/mnemonic-toolkit/manual-gui/#<anchor>`
        # (see `mnemonic-gui/src/help/url.rs:31-34` and the kittest at
        # `tests/widget_help_icon.rs:166`), so the deployed file MUST be
        # named `index.html` for GitHub Pages to serve it as the
        # directory root. A canonical-named alias is kept alongside the
        # index for stable archival links.
        #
        # The branch is created on first run if it does not yet exist
        # (the GitHub-Pages-bootstrap requirement is documented in the
        # cycle plan's PE.5 — Pages must be enabled BEFORE the first tag
        # push for the URL to resolve).
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          if git fetch origin gh-pages:gh-pages 2>/dev/null; then
            git worktree add "$tmpdir" gh-pages
          else
            git worktree add --orphan -b gh-pages "$tmpdir"
            ( cd "$tmpdir" && git commit --allow-empty -m "bootstrap gh-pages" )
          fi
          mkdir -p "$tmpdir/manual-gui"
          # Primary: index.html so GitHub Pages serves it at the
          # directory root (matches GUI's hardcoded help-icon URL).
          cp docs/manual-gui/build/m-format-gui-manual.html \
            "$tmpdir/manual-gui/index.html"
          # Archival alias under the canonical name — stable for
          # direct-link scenarios that bypass the directory root.
          cp docs/manual-gui/build/m-format-gui-manual.html \
            "$tmpdir/manual-gui/m-format-gui-manual.html"
          (
            cd "$tmpdir"
            git add manual-gui/index.html manual-gui/m-format-gui-manual.html
            if ! git diff --cached --quiet; then
              git commit -m "manual-gui: publish $REF_NAME HTML"
              git push origin gh-pages
            else
              echo "No HTML change vs gh-pages HEAD; skipping push."
            fi
          )
          git worktree remove --force "$tmpdir"
