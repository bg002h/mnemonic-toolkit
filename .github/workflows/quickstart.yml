name: quickstart

# `paths` filters apply only to branch pushes / PRs; tag pushes
# matching `quickstart-v*` always trigger the workflow regardless of
# which files are in the tag's commit. This is intentional — the
# release-asset upload step needs to run on every tag push.

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/quickstart/**'
      - 'docs/tools/render-mermaid-cache.py'
      - '.github/workflows/quickstart.yml'
    tags:
      - 'quickstart-v*'
  pull_request:
    paths:
      - 'docs/quickstart/**'
      - 'docs/manual/.markdownlint-cli2.jsonc'
      - 'docs/manual/pandoc/filters/**'
      - 'docs/tools/render-mermaid-cache.py'
      - '.github/workflows/quickstart.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pandoc + texlive
        # No chromium / mermaid-filter / mermaid-cli — the build runs
        # MERMAID_FILTER=skip and consumes the checked-in figures/cache/
        # PDFs. See `ci-chromium-drop` (closed) in docs/manual/FOLLOWUPS.md.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-extra-utils \
            make

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install npm tools (lints only)
        run: |
          npm install -g \
            markdownlint-cli2@^0.13 \
            cspell@^8

      - name: Install lychee
        run: |
          LARCH=x86_64-unknown-linux-gnu
          curl -fsSL "https://github.com/lycheeverse/lychee/releases/download/lychee-v0.24.2/lychee-${LARCH}.tar.gz" \
            | sudo tar -xz --strip-components=1 -C /usr/local/bin "lychee-${LARCH}/lychee"
          sudo chmod +x /usr/local/bin/lychee

      - name: Install mk-cli
        # Use package-name selector (`mk-cli`) instead of `--bin mk`: the
        # mnemonic-key workspace ships multiple binaries (mk-codec's
        # gen_mk_vectors + mk-cli's mk), and cargo refuses --bin disambig
        # against a multi-binary workspace.
        run: cargo install --git https://github.com/bg002h/mnemonic-key --tag mk-cli-v0.12.0 mk-cli

      - name: Install md-cli
        # Mirrors the mk-cli install pattern above. Use package-name selector
        # (`md-cli`); the descriptor-mnemonic workspace ships multiple binaries.
        # `--features cli-compiler` matches scripts/install.sh's component pin.
        run: cargo install --git https://github.com/bg002h/descriptor-mnemonic --tag descriptor-mnemonic-md-cli-v0.11.2 md-cli --features cli-compiler

      - name: Install ms-cli
        # Mirrors the mk-cli + md-cli install patterns above.
        run: cargo install --git https://github.com/bg002h/mnemonic-secret --tag ms-cli-v0.13.2 ms-cli

      - name: Build mnemonic binary (debug)
        # Debug binary is sufficient for transcript-replay byte-comparison;
        # behavior under test is identical between debug/release modulo
        # panic-handler verbosity, and mnemonic never panics in normal flow.
        run: cargo build --bin mnemonic

      - name: Lint quickstart
        # Binary-independent flag-coverage / markdownlint / cspell / lychee.
        # MNEMONIC_BIN=true MD_BIN=true MS_BIN=true are placeholders — the lint
        # gate does not execute the CLIs; output fidelity is gated separately by
        # the verify-examples step below.
        working-directory: docs/quickstart
        run: make lint MNEMONIC_BIN=true MD_BIN=true MS_BIN=true MK_BIN=mk

      - name: Verify worked-example output fidelity (real binaries)
        # Replays every committed transcript against the real installed CLIs and
        # byte-compares against the golden .out (the include-transcript filter
        # renders fenced blocks FROM these goldens). The QuickStart's transcripts/
        # is a symlink to the manual's, so this replays the shared pool — hence
        # FIXTURES_DIR is passed for the cross-format-recipes transcripts.
        # All flag values are constants or $GITHUB_WORKSPACE (no untrusted
        # github.event.* fields).
        working-directory: docs/quickstart
        run: |
          make verify-examples \
            MNEMONIC_BIN="$GITHUB_WORKSPACE/target/debug/mnemonic" \
            MD_BIN=md \
            MS_BIN=ms \
            MK_BIN=mk \
            FIXTURES_DIR="$GITHUB_WORKSPACE/crates/mnemonic-toolkit/tests/fixtures/wallet_import"

      - name: Build PDF
        working-directory: docs/quickstart
        run: make pdf MERMAID_FILTER=skip

      - name: Verify PDF
        working-directory: docs/quickstart
        run: test -f build/m-format-quickstart.pdf && ls -lh build/m-format-quickstart.pdf

      - name: Build HTML
        # Self-contained pandoc --standalone render (embedded CSS); opens in
        # any browser with no server — the no-PDF-viewer release asset.
        working-directory: docs/quickstart
        run: make html MERMAID_FILTER=skip

      - name: Verify HTML
        working-directory: docs/quickstart
        run: test -f build/m-format-quickstart.html && ls -lh build/m-format-quickstart.html

      - name: Upload PDF as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: m-format-quickstart-pdf
          path: docs/quickstart/build/m-format-quickstart.pdf

      - name: Upload HTML as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: m-format-quickstart-html
          path: docs/quickstart/build/m-format-quickstart.html

      - name: Ensure GitHub release exists for this tag
        if: startsWith(github.ref, 'refs/tags/quickstart-v')
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$REF_NAME" >/dev/null 2>&1; then
            gh release create "$REF_NAME" --title "$REF_NAME" --generate-notes || true
          fi

      - name: Upload PDF to release (on quickstart-v* tag)
        if: startsWith(github.ref, 'refs/tags/quickstart-v')
        env:
          REF_NAME: ${{ github.ref_name }}
        working-directory: docs/quickstart
        run: gh release upload "$REF_NAME" build/m-format-quickstart.pdf --clobber

      - name: Upload HTML to release (on quickstart-v* tag)
        if: startsWith(github.ref, 'refs/tags/quickstart-v')
        env:
          REF_NAME: ${{ github.ref_name }}
        working-directory: docs/quickstart
        run: gh release upload "$REF_NAME" build/m-format-quickstart.html --clobber
