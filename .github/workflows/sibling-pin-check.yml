name: sibling-pin-check

# Fires on every push + PR + manual dispatch. Asserts that the
# sibling-CLI `cargo install --git … --tag <pin>` lines in the scan
# set match the canonical pins in `scripts/install.sh`'s
# `component_info` table.
#
# Scan set: every `.github/workflows/*.yml` file (except this gate
# itself) PLUS every `docs/manual/src/**` and `docs/quickstart/src/**`
# prose markdown file. Matching is URL-keyed (the canonical lookup
# keys on the `--git <repo-url>`), which handles BOTH the workflow
# `--tag <tag> <pkg>` form AND the prose `--tag <tag> --bin <bin>`
# form without a bin↔pkg name map.
#
# Scope: sibling pins only (md-cli, ms-cli, mk-cli). The toolkit
# self-pin is gated by `install-pin-check.yml`; GUI repo pins are
# gated by `mnemonic-gui` per `gui-schema-mirror-lockstep-discipline`.
# GitHub Actions tool-dep pins (`actions/*`, `dtolnay/rust-toolchain`,
# `lychee-v*`, `markdownlint-cli2@*`, `cspell@*`) are NOT in scope —
# those are runner-tool versions, not sibling-CLI mirrors.
#
# Filed 2026-05-28 (FOLLOWUP `manual-yml-sibling-pin-vs-install-sh-
# drift-gate`) as defense-in-depth complement to the v0.36.4 closed
# parent FOLLOWUP `manual-yml-and-install-sh-sibling-gui-pin-staleness`
# — the parent fixed the symptom; this gate prevents recurrence.
# Spec: `design/SPEC_sibling_pin_drift_gate.md`. R0 review:
# `design/agent-reports/sibling-pin-drift-gate-R0-review.md`.
# Prose-scan extension (FOLLOWUP
# `sibling-pin-check-skips-manual-prose-install-commands`) added
# 2026-06-23. Spec:
# `design/SPEC_sibling_pin_check_prose_scan_extension.md`.
#
# Recovery if this fails: update the drifted file's `--tag` argument
# to match the canonical pin in `scripts/install.sh`, OR (if the
# file's pin is intentionally newer) update install.sh's
# `component_info` arm to match, then re-push.

on:
  push:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  sibling-pins-match-install-sh:
    name: sibling pins match install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify sibling-CLI pins match scripts/install.sh
        run: |
          set -eu

          INSTALL_SH=scripts/install.sh
          if [ ! -f "$INSTALL_SH" ]; then
            echo "::error::sibling-pin-check: $INSTALL_SH missing"
            exit 1
          fi

          # Parse install.sh's `component_info` arms into a
          # newline-separated `url|tag` table. Each canonical line has
          # the shape:
          #   echo "<pkg>|<repo-url>|<tag>|<bool>|<features-opt>"
          # The toolkit arm uses pkg=mnemonic-toolkit (the SELF-pin —
          # excluded by field-1 name; gated by install-pin-check.yml).
          # The table is keyed on the REPO-URL (field 2), not the pkg
          # name, so the per-line scan can resolve both the workflow
          # `--tag <tag> <pkg>` form AND the prose `--tag <tag> --bin
          # <bin>` form by url alone (no bin↔pkg name map needed). The
          # GUI arm (`mnemonic-gui|…`) is in this url-keyed table (the
          # awk excludes only `mnemonic-toolkit`); this is neutral today
          # (no scanned file carries a GUI `cargo install` line) and is
          # latent enablement for a future GUI drift-check — NOT scope
          # creep. Forward-compatible: an unknown repo-url in a scanned
          # line yields a `::warning::`, not a failure (see below).
          CANONICAL=$(grep -oE 'echo "[a-z-]+\|https://[^"]+\|[^"|]+\|[^"|]*\|[^"]*"' "$INSTALL_SH" \
            | sed -e 's/^echo "//' -e 's/"$//' \
            | awk -F'|' 'BEGIN{OFS="|"} $1 != "mnemonic-toolkit" {print $2, $3}')

          if [ -z "$CANONICAL" ]; then
            echo "::error::sibling-pin-check: no sibling component_info arms parsed from $INSTALL_SH"
            exit 1
          fi

          echo "Canonical sibling pins (from $INSTALL_SH):"
          echo "$CANONICAL" | sed 's/^/  /'

          # Look up canonical tag for a repo-url from the parsed table.
          # Echoes the tag on stdout (empty if url not in table).
          canonical_tag_for_url() {
            local url="$1"
            echo "$CANONICAL" | awk -F'|' -v u="$url" '$1 == u {print $2; exit}'
          }

          # Build the scan set: every workflow YAML (except this gate
          # itself) + every manual/quickstart prose markdown file. Only
          # the src/ trees are scanned (build output is git-ignored).
          # Prose-scan extension (FOLLOWUP
          # sibling-pin-check-skips-manual-prose-install-commands) added
          # 2026-06-23. Spec:
          # design/SPEC_sibling_pin_check_prose_scan_extension.md. Paths
          # have no spaces in this repo, so word-splitting a space-joined
          # list is safe here.
          SCAN_FILES=""
          for wf in .github/workflows/*.yml; do
            case "$(basename "$wf")" in
              sibling-pin-check.yml) continue ;;
            esac
            SCAN_FILES="$SCAN_FILES $wf"
          done
          for d in docs/manual/src docs/quickstart/src; do
            [ -d "$d" ] || continue
            mds=$(find "$d" -type f -name '*.md')
            SCAN_FILES="$SCAN_FILES $mds"
          done

          # Single-pass scan: process-substitution feeds the loop in
          # the current shell so $FAIL mutations propagate. The detector
          # requires BOTH `--git <url>` AND `--tag <tag>` (so tagless
          # illustrative prose never matches) but does NOT require a
          # trailing bareword pkg — so it matches the workflow
          # `--tag <tag> <pkg>` form AND the prose `--tag <tag> --bin
          # <bin>` form. Canonical is resolved by url, sidestepping the
          # bin↔pkg name map.
          FAIL=0
          for f in $SCAN_FILES; do
            [ -f "$f" ] || continue
            while IFS=: read -r lineno line; do
              url=$(echo "$line" | grep -oE -- '--git +https?://[^ ]+' | awk '{print $2}')
              tag=$(echo "$line" | grep -oE -- '--tag +[^ ]+' | awk '{print $2}')
              if [ -z "$url" ] || [ -z "$tag" ]; then
                echo "::warning::sibling-pin-check: $f:$lineno: could not extract url/tag from cargo-install line — skipped"
                continue
              fi
              canonical=$(canonical_tag_for_url "$url")
              if [ -z "$canonical" ]; then
                echo "::warning::sibling-pin-check: $f:$lineno: unknown repo-url '$url'; add a component_info arm in $INSTALL_SH to gate this pin"
                continue
              fi
              if [ "$tag" != "$canonical" ]; then
                echo "::error::sibling-pin-check: $f:$lineno: pin '$tag' (url $url) does not match $INSTALL_SH canonical '$canonical'"
                FAIL=1
              else
                echo "  OK $f:$lineno: $tag"
              fi
            done < <(grep -nE 'cargo install --git +https?://[^ ]+ +--tag +[^ ]+' "$f" || true)
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::sibling-pin-check: one or more sibling pins drifted from $INSTALL_SH"
            exit 1
          fi
          echo "OK all sibling pins match $INSTALL_SH"
