name: rust

# Cycle B Phase 2 P2.T4 — first Rust CI workflow for the toolkit.
# Per SPEC §6 G3 (platform coverage: Ubuntu + macOS) and §6 G4.b (Miri on
# mlock's unsafe blocks). Per Phase 2 R0 I-R0-1 fold (commit 8193e22):
# the toolkit had no Rust CI workflow before this file (manual.yml +
# quickstart.yml are docs-build only).
#
# Security note: this workflow uses only GitHub-provided trusted context
# (matrix.os, runner.os). No interpolation of untrusted user input
# (issue/PR titles, commit messages, etc.).

on:
  push:
    branches: [main, master]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yml'

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # FOLLOWUP cargo-lock-version-bump-lockstep: fail CI when Cargo.lock is
      # stale relative to Cargo.toml (e.g. a version bump that forgot to
      # regenerate/commit the lockfile). `--locked` errors if resolution would
      # need to change the committed lock; `cargo metadata` resolves without
      # compiling, so this is a fast fail-fast guard before the build.
      - name: Verify Cargo.lock is up to date (--locked guard)
        run: cargo metadata --locked --format-version 1 > /dev/null

      - name: Show ulimit -l (diagnostic)
        run: ulimit -l || true

      - name: cargo build --tests
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          cargo build --tests -p mnemonic-toolkit

      - name: cargo test (default tests; G2.1 #[ignore]-gated)
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          cargo test -p mnemonic-toolkit

      - name: G2.1 eperm fault injection (fresh subprocess; env set before cargo)
        # Per SPEC §4 P2 + plan P2.T2: cfg(test) FAIL_MODE injection is only
        # reachable from library unit tests (cfg(test) is per-crate-not-per-
        # build, RFC 1604). G2.1 is #[ignore]-gated and filtered to the
        # specific test name so the OnceLock<FailMode> initializes fresh
        # from MNEMONIC_TEST_MLOCK_FAIL_MODE in this step's env.
        env:
          MNEMONIC_TEST_MLOCK_FAIL_MODE: "eperm"
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          cargo test -p mnemonic-toolkit --lib mlock::tests::g2_1 -- --include-ignored

      - name: G2.3-debug einval debug_assert (fresh subprocess)
        # Per SPEC §6 G2.3: debug builds trip debug_assert when mlock returns
        # EINVAL under fault injection. #[should_panic(expected = "EINVAL")]
        # asserts the panic message contains the substring.
        env:
          MNEMONIC_TEST_MLOCK_FAIL_MODE: "einval"
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          cargo test -p mnemonic-toolkit --lib mlock::tests::g2_3 -- --include-ignored

      - name: G2.4 off control (fresh subprocess)
        # Per SPEC §6 G2.4: control case — FAIL_MODE=off must not synthesize
        # failures. Verifies the wrapper does not increment failure_count
        # spuriously in a healthy ulimit environment.
        # NOTE: bare 'off' in YAML 1.1 is a boolean false; quote to force
        # string interpretation (GitHub Actions rejects the workflow without
        # quotes — first observed at run 25834458333 on 2026-05-14).
        env:
          MNEMONIC_TEST_MLOCK_FAIL_MODE: "off"
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          cargo test -p mnemonic-toolkit --lib mlock::tests::g2_4 -- --include-ignored

  test-release-mlock-einval:
    # Cycle B Phase 3a — release-build coverage for G2.3 EINVAL soft-fail.
    # Per SPEC §6 G2.3 release branch: in release builds the debug_assert
    # is compiled out, so EINVAL injection must soft-fail (record_failure)
    # rather than panic. The g2_3_einval_release_soft_fails test asserts
    # failure_count > 0 and first_errno == EINVAL. Linux-only because the
    # release-build-coverage gate is sufficient on one platform; the
    # cfg(test) FAIL_MODE branch is platform-uniform.
    name: "test (release, ubuntu-latest, mlock einval)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show ulimit -l (diagnostic)
        run: ulimit -l || true
      - name: G2.3-release einval soft-fail
        env:
          MNEMONIC_TEST_MLOCK_FAIL_MODE: "einval"
        run: |
          ulimit -l 65536 || true
          cargo test --release -p mnemonic-toolkit --lib mlock::tests::g2_3 -- --include-ignored

  miri:
    name: miri (mlock unsafe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly + miri component
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: "cargo +nightly miri test mlock::"
        # Per SPEC §6 G4.b: Miri verifies the Rust-side safety of mlock's
        # 2 unsafe blocks (libc::mlock in pin_pages_for; libc::munlock in
        # PinnedPageRange::drop). cfg(miri) shims stub the syscalls.
        run: "cargo +nightly miri test -p mnemonic-toolkit --lib mlock::"

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

  lib-cross-platform:
    # v0.14.1 — added after the v0.14.0 release because the GUI's Windows
    # build matrix (mnemonic-gui v0.4.0+ depends on this crate's lib for
    # `pub mod secret_taxonomy`) caught a Windows-incompat: `pub mod mlock`
    # uses POSIX `libc::mlock` / `libc::sysconf` / `_SC_PAGESIZE`, none of
    # which exist in libc's Windows surface. The architect's risk-#5 (lib
    # platform compat audit) was satisfied previously only by the binary's
    # CI matrix [ubuntu, macos]; this job extends compile-only coverage to
    # the lib for the platforms downstream consumers actually target.
    name: lib cross-platform check
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install-rust pinned toolchain
        # Use the toolkit's pinned `rust-toolchain.toml` channel (1.85.0)
        # so the cross-platform check matches the version used by the
        # primary [ubuntu, macos] test matrix.
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: ${{ matrix.target }}
      - name: install aarch64-linux cross-compiler (linux target only)
        # A C dep in the toolkit's transitive graph (e.g., ring / sha2-asm
        # via secp256k1) needs `aarch64-linux-gnu-gcc` for cross-compile.
        # GitHub's ubuntu-latest runner has the package available via apt
        # but doesn't install it by default. windows-latest doesn't need
        # an explicit cross-compiler (MSVC is preinstalled).
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: cargo check --lib (cross-platform)
        # Compile-only (no test execution); the bin target is intentionally
        # excluded — `mnemonic` CLI is unix-only by virtue of mlock.
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          # Point cc-rs at the cross-compiler installed above.
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo check --lib --target "$TARGET" -p mnemonic-toolkit

  g6-invariant:
    # Cycle B SPEC §6 G6 — cross-repo mlock.rs inline-copy invariant.
    # Checks out the sibling repo (mnemonic-secret) to a known runner path,
    # then runs `tests/mlock_g6_invariant.rs` which asserts the normalized
    # source of toolkit's `crates/mnemonic-toolkit/src/mlock.rs` and
    # ms-cli's `crates/ms-cli/src/mlock.rs` are byte-equal across the
    # diff manifest plus name-export parity. Test pulls the sibling path
    # from $SIBLING_REPO_PATH.
    name: "g6 invariant (cross-repo mlock.rs)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout own (mnemonic-toolkit)
        uses: actions/checkout@v4
        with:
          path: mnemonic-toolkit
      - name: Checkout sibling (mnemonic-secret)
        uses: actions/checkout@v4
        with:
          repository: bg002h/mnemonic-secret
          ref: master
          path: mnemonic-secret
      - name: cargo test --test mlock_g6_invariant
        env:
          SIBLING_REPO_PATH: ${{ github.workspace }}/mnemonic-secret
        working-directory: mnemonic-toolkit
        # G6 tests are #[ignore]-gated to keep the default `cargo test`
        # step (which has no SIBLING_REPO_PATH set + no sibling checkout)
        # from invoking them. --include-ignored opts them in for this job
        # which DOES have both.
        run: cargo test -p mnemonic-toolkit --test mlock_g6_invariant -- --include-ignored
