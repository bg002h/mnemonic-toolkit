name: rust

# Cycle B Phase 2 P2.T4 — first Rust CI workflow for the toolkit.
# Per SPEC §6 G3 (platform coverage: Ubuntu + macOS) and §6 G4.b (Miri on
# mlock's unsafe blocks). Per Phase 2 R0 I-R0-1 fold (commit 8193e22):
# the toolkit had no Rust CI workflow before this file (manual.yml +
# quickstart.yml are docs-build only).
#
# Security note: this workflow uses only GitHub-provided trusted context
# (matrix.os, runner.os). No interpolation of untrusted user input
# (issue/PR titles, commit messages, etc.).

on:
  push:
    branches: [main, master]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yml'
  pull_request:
    # NO paths — this workflow's `test`/`clippy` contexts are REQUIRED status
    # checks (branch protection), and a path-filtered required check wedges a
    # docs-only PR forever at "Expected — waiting for status" (mirror
    # examples.yml's ruling). Running the full matrix on a docs-only PR is
    # green (unchanged code) — the cost is CI minutes, not correctness. The
    # push-side path filter above keeps code-push efficiency; docs-only DIRECT
    # pushes to master are covered by admin bypass (enforce_admins:false).

jobs:
  # Dedicated rustfmt gate, pinned to a CANONICAL formatter version (1.95.0,
  # matching mnemonic-key's CI). rustfmt output drifts between toolchain
  # releases, so the FORMATTER is pinned independently of the build MSRV:
  # bump it DELIBERATELY (install the new version + re-run `cargo +<new> fmt
  # --all` in the SAME commit). The explicit `+1.95.0` is REQUIRED here — the
  # repo's `rust-toolchain.toml` pins 1.85.0, which a bare `cargo fmt` would
  # otherwise use. (The 1.95.0-formatted tree is also clean under 1.85.0's
  # rustfmt today, so a developer's bare `cargo fmt` does not re-drift it —
  # verified at the v0.55.x fmt chore; if a future rustfmt diverges, this gate
  # catches it.) Source was reformatted to 1.95.0 in the same chore.
  #
  # EXEMPTION — `crates/mnemonic-toolkit/src/mlock.rs` is the ONE file excluded
  # from this gate. It is a cross-repo byte-synced file governed by the `g6`
  # invariant (see the "g6 invariant" job below): it must stay byte-equal
  # (modulo comments) to `crates/ms-cli/src/mlock.rs` in mnemonic-secret, and g6
  # tracks the canonical ms-cli tag read DYNAMICALLY from scripts/install.sh
  # (field 3; currently `ms-cli-v0.13.2`), whose copy is
  # NOT 1.95.0-formatted. So mlock.rs's format is pinned to that tag, NOT to
  # this formatter — a bare `cargo fmt --all` would re-wrap it and break g6.
  # The exemption is durably recorded in design/FOLLOWUPS.md (mlock-rs-fmt-exempt).
  # When the ms-cli pin is next bumped to a 1.95.0-formatted tag, reformat
  # mlock.rs in BOTH repos in lockstep and drop this exemption.
  fmt:
    name: fmt (pinned 1.95.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.95.0 (canonical fmt toolchain)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt
      - name: Rustfmt (pinned 1.95.0, overriding rust-toolchain.toml; mlock.rs exempt)
        # `cargo fmt --all -- --check` over the whole workspace (handles each
        # crate's edition automatically), then tolerate diffs ONLY in mlock.rs
        # (the g6-pinned cross-repo file — see the exemption note above). rustfmt
        # 1.95.0 emits one `Diff in <path>:<line>:` header per file needing
        # formatting; we fail iff any NON-mlock.rs file appears.
        run: |
          out=$(cargo +1.95.0 fmt --all -- --check 2>&1) || true
          bad=$(printf '%s\n' "$out" | grep -oE '^Diff in [^:]+' \
            | sed 's/^Diff in //' | grep -v '/mlock\.rs$' || true)
          if [ -n "$bad" ]; then
            echo "::error::rustfmt 1.95.0 — these non-exempt files need formatting:"
            printf '%s\n' "$bad"
            printf '%s\n' "$out"
            exit 1
          fi
          echo "rustfmt 1.95.0 clean (mlock.rs exempt by the g6 cross-repo invariant)"

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # FOLLOWUP cargo-lock-version-bump-lockstep: fail CI when Cargo.lock is
      # stale relative to Cargo.toml (e.g. a version bump that forgot to
      # regenerate/commit the lockfile). `--locked` errors if resolution would
      # need to change the committed lock; `cargo metadata` resolves without
      # compiling, so this is a fast fail-fast guard before the build.
      - name: Verify Cargo.lock is up to date (--locked guard)
        run: cargo metadata --locked --format-version 1 > /dev/null

      - name: Show ulimit -l (diagnostic)
        run: ulimit -l || true

      - name: cargo build --tests
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          cargo build --tests --workspace

      - name: cargo test (default tests; G2.1 #[ignore]-gated)
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          # --workspace covers mnemonic-toolkit + wc-codec (the 2 members);
          # the nested crates/wc-codec/fuzz/ is its OWN workspace, invisible
          # here. Anti-recurrence: a future member is auto-covered (eval #2
          # existed because wc-codec was a member never `-p`'d in CI).
          cargo test --workspace

      - name: G2.1 eperm fault injection (fresh subprocess; env set before cargo)
        # Per SPEC §4 P2 + plan P2.T2: cfg(test) FAIL_MODE injection is only
        # reachable from library unit tests (cfg(test) is per-crate-not-per-
        # build, RFC 1604). G2.1 is #[ignore]-gated and filtered to the
        # specific test name so the OnceLock<FailMode> initializes fresh
        # from MNEMONIC_TEST_MLOCK_FAIL_MODE in this step's env.
        env:
          MNEMONIC_TEST_MLOCK_FAIL_MODE: "eperm"
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          cargo test -p mnemonic-toolkit --lib mlock::tests::g2_1 -- --include-ignored

      - name: G2.3-debug einval debug_assert (fresh subprocess)
        # Per SPEC §6 G2.3: debug builds trip debug_assert when mlock returns
        # EINVAL under fault injection. #[should_panic(expected = "EINVAL")]
        # asserts the panic message contains the substring.
        env:
          MNEMONIC_TEST_MLOCK_FAIL_MODE: "einval"
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          cargo test -p mnemonic-toolkit --lib mlock::tests::g2_3 -- --include-ignored

      - name: G2.4 off control (fresh subprocess)
        # Per SPEC §6 G2.4: control case — FAIL_MODE=off must not synthesize
        # failures. Verifies the wrapper does not increment failure_count
        # spuriously in a healthy ulimit environment.
        # NOTE: bare 'off' in YAML 1.1 is a boolean false; quote to force
        # string interpretation (GitHub Actions rejects the workflow without
        # quotes — first observed at run 25834458333 on 2026-05-14).
        env:
          MNEMONIC_TEST_MLOCK_FAIL_MODE: "off"
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          cargo test -p mnemonic-toolkit --lib mlock::tests::g2_4 -- --include-ignored

  test-release-mlock-einval:
    # Cycle B Phase 3a — release-build coverage for G2.3 EINVAL soft-fail.
    # Per SPEC §6 G2.3 release branch: in release builds the debug_assert
    # is compiled out, so EINVAL injection must soft-fail (record_failure)
    # rather than panic. The g2_3_einval_release_soft_fails test asserts
    # failure_count > 0 and first_errno == EINVAL. Linux-only because the
    # release-build-coverage gate is sufficient on one platform; the
    # cfg(test) FAIL_MODE branch is platform-uniform.
    name: "test (release, ubuntu-latest, mlock einval)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Show ulimit -l (diagnostic)
        run: ulimit -l || true
      - name: G2.3-release einval soft-fail
        env:
          MNEMONIC_TEST_MLOCK_FAIL_MODE: "einval"
        run: |
          ulimit -l 65536 || true
          cargo test --release -p mnemonic-toolkit --lib mlock::tests::g2_3 -- --include-ignored

  miri:
    name: miri (mlock unsafe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install nightly + miri component
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: "cargo +nightly miri test mlock::"
        # Per SPEC §6 G4.b: Miri verifies the Rust-side safety of mlock's
        # 2 unsafe blocks (libc::mlock in pin_pages_for; libc::munlock in
        # PinnedPageRange::drop). cfg(miri) shims stub the syscalls.
        run: "cargo +nightly miri test -p mnemonic-toolkit --lib mlock::"

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

  lib-cross-platform:
    # v0.14.1 — added after the v0.14.0 release because the GUI's Windows
    # build matrix (mnemonic-gui v0.4.0+ depends on this crate's lib for
    # `pub mod secret_taxonomy`) caught a Windows-incompat: `pub mod mlock`
    # uses POSIX `libc::mlock` / `libc::sysconf` / `_SC_PAGESIZE`, none of
    # which exist in libc's Windows surface. The architect's risk-#5 (lib
    # platform compat audit) was satisfied previously only by the binary's
    # CI matrix [ubuntu, macos]; this job extends compile-only coverage to
    # the lib for the platforms downstream consumers actually target.
    name: lib cross-platform check
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
          # FreeBSD compile-gate (Cycle C). `x86_64-unknown-freebsd` is Tier 2
          # with Host Tools, so `rustup target add` ships a precompiled std on
          # the ubuntu runner — no apt cross-compiler step needed (cargo check
          # stops before link; the only C step is the vendored libsecp256k1 cc
          # compile, which builds fine against the Tier-2 std). The toolkit
          # `--lib` row IS correct here specifically because the toolkit alone
          # declares `process_hardening` as `pub mod` in `src/lib.rs`, so the
          # new BSD secret-hygiene arm (procctl/setrlimit) is compiled by --lib.
          # (The 3 sibling CLIs are bin-only and use bare `cargo check --target`
          # — see their workflows; --lib there would be silent false-green.)
          # Fallback if the secp256k1-sys cc cross-build ever needs a freebsd
          # sysroot: switch this row to `cross check --target …` (cross-rs
          # bundles a freebsd container). Validated locally with bare rustup.
          - target: x86_64-unknown-freebsd
            runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install-rust pinned toolchain
        # Use the toolkit's pinned `rust-toolchain.toml` channel (1.85.0)
        # so the cross-platform check matches the version used by the
        # primary [ubuntu, macos] test matrix.
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: ${{ matrix.target }}
      - name: install aarch64-linux cross-compiler (linux target only)
        # The toolkit's only C dependency is the vendored libsecp256k1
        # (`secp256k1-sys`); there is no `ring` in the tree. Cross-compiling
        # its C for the aarch64-linux target needs `aarch64-linux-gnu-gcc`.
        # GitHub's ubuntu-latest runner has the package available via apt
        # but doesn't install it by default. windows-latest doesn't need
        # an explicit cross-compiler (MSVC is preinstalled); the freebsd row
        # needs none either (cargo check stops before link).
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: cargo check --lib (cross-platform)
        # Compile-only (no test execution); the bin target is intentionally
        # excluded — `mnemonic` CLI is unix-only by virtue of mlock.
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          # Point cc-rs at the cross-compiler installed above.
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo check --lib --target "$TARGET" -p mnemonic-toolkit

  g6-invariant:
    # Cycle B SPEC §6 G6 — cross-repo mlock.rs inline-copy invariant.
    # Checks out the sibling repo (mnemonic-secret) to a known runner path,
    # then runs `tests/mlock_g6_invariant.rs` which asserts the normalized
    # source of toolkit's `crates/mnemonic-toolkit/src/mlock.rs` and
    # ms-cli's `crates/ms-cli/src/mlock.rs` are byte-equal across the
    # diff manifest plus name-export parity. Test pulls the sibling path
    # from $SIBLING_REPO_PATH.
    name: "g6 invariant (cross-repo mlock.rs)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout own (mnemonic-toolkit)
        uses: actions/checkout@v6
        with:
          path: mnemonic-toolkit
      # g6-sibling-master-not-pin: pin the sibling checkout to the canonical
      # ms-cli tag (scripts/install.sh, the sibling-pin-check source of truth)
      # instead of `master`, so the byte-equality runs against the version the
      # constellation actually targets. Extraction mirrors sibling-pin-check.yml's
      # parser; fail-loud on empty (else an empty `ref:` would silently default
      # to the default branch = the bug this fixes).
      - name: Resolve pinned ms-cli tag from install.sh
        id: pin
        working-directory: mnemonic-toolkit
        run: |
          tag=$(grep -oE 'echo "[a-z-]+\|https://[^"]+\|[^"|]+\|[^"|]*\|[^"]*"' scripts/install.sh \
            | sed -e 's/^echo "//' -e 's/"$//' \
            | awk -F'|' '$1=="ms-cli"{print $3; exit}')
          if [ -z "$tag" ]; then
            echo "::error::g6: could not resolve the ms-cli pin from scripts/install.sh"
            exit 1
          fi
          echo "Resolved ms-cli pin: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Checkout sibling (mnemonic-secret)
        uses: actions/checkout@v6
        with:
          repository: bg002h/mnemonic-secret
          ref: ${{ steps.pin.outputs.tag }}
          path: mnemonic-secret
      - name: cargo test --test mlock_g6_invariant
        env:
          SIBLING_REPO_PATH: ${{ github.workspace }}/mnemonic-secret
        working-directory: mnemonic-toolkit
        # G6 tests are #[ignore]-gated to keep the default `cargo test`
        # step (which has no SIBLING_REPO_PATH set + no sibling checkout)
        # from invoking them. --include-ignored opts them in for this job
        # which DOES have both.
        run: cargo test -p mnemonic-toolkit --test mlock_g6_invariant -- --include-ignored

  musl-build-test:
    # musl target coverage (static air-gapped binary cycle). Both musl targets
    # are Tier 2 with Host Tools and `unix` + Linux, so every `#[cfg(unix)]` /
    # `#[cfg(target_os = "linux")]` path (mlock, process_hardening) compiles and
    # is functional on musl with ZERO source change.
    #
    # Two rows, distinct treatment:
    #   * x86_64-musl — built + FULLY TESTED natively on ubuntu. Unlike the
    #     `lib cross-platform check` job (which is `--lib`-only because the
    #     `mnemonic` bin is unix-only relative to *Windows*), musl IS unix, so
    #     the bin builds and the WHOLE `cargo test -p mnemonic-toolkit` package
    #     suite runs — argv/schema/version lints ride along (MEMORY lesson:
    #     full package suite, not targeted targets). Needs `musl-tools`
    #     (provides `musl-gcc`) + `CC_x86_64_unknown_linux_musl=musl-gcc` so
    #     cc-rs builds the ONLY C dep — the vendored libsecp256k1 in
    #     `secp256k1-sys` — against musl (else cc silently falls back to host
    #     gcc → glibc-linked). Honors the `ulimit -l 65536` dance (mlock tests).
    #   * aarch64-musl — `cross test` under QEMU user-mode emulation (cross
    #     bundles the musl cross C toolchain AND the qemu-aarch64 runner; no apt
    #     step). This RUNS the package test suite on aarch64-Linux so the
    #     md1/address golden vectors are output-verified for the shipped aarch64
    #     binary — not merely compiled.
    #
    #     The mlock / page-pinning acceptance gates are SKIPPED here — they are
    #     POSIX-`mlock(2)` syscall + runtime-page-size tests, not meaningfully
    #     testable under QEMU (qemu-user forwards `mlock` to the host kernel
    #     inside the cross Docker container, which can EPERM under the
    #     container's RLIMIT_MEMLOCK; emulated page size / heap alignment can
    #     also differ — `g4_a` asserts a 64-byte buf pins exactly 1 page), and
    #     mlock behavior is not this job's target (the output goldens are). Two
    #     `--skip` filters are needed because libtest matches a filter against
    #     the per-test name WITHIN each binary, not the binary name:
    #       - `--skip mlock` drops the lib unit tests `mlock::tests::*`
    #         (incl. `g4_a_*`); the `#[ignore]`-gated `g2_*` fault-injection
    #         tests are already skipped (no `--include-ignored`).
    #       - `--skip g1_` drops the `tests/mlock_unit.rs` integration binary's
    #         G1.x page-pinning gates (`g1_1`..`g1_4`) — their fn names lack the
    #         "mlock" substring, so `--skip mlock` alone would NOT catch them.
    #     The `lint_safety_first_party_mlock` binary is a pure SOURCE-TEXT scan
    #     of `src/mlock.rs` (no syscall, no page math) and intentionally still
    #     runs; every bundle/convert/md1 golden integration test runs too.
    #
    # crt-static is left at its musl default (ON). NEVER pass
    # `-Ctarget-feature=-crt-static` — per rust#135244 that silently links host
    # glibc and destroys the static deliverable.
    #
    # Toolchain pinned `@1.85.0` (matches `rust-toolchain.toml` and the existing
    # `lib-cross-platform` pin); do NOT float `@stable` here.
    #
    # Security note: this job uses only GitHub-provided trusted context. No
    # interpolation of untrusted user input.
    name: musl build+test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            musl_native: true
          - target: aarch64-unknown-linux-musl
            cross: true
    steps:
      - uses: actions/checkout@v6
      - name: install-rust pinned toolchain
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: ${{ matrix.target }}
      - name: install musl-tools (x86_64-musl native)
        if: ${{ matrix.musl_native }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: install cross (aarch64-musl)
        if: ${{ matrix.cross }}
        run: cargo install --locked cross
      # Register QEMU/binfmt_misc for aarch64 so `cross test` tests that spawn
      # the binary as a subprocess (raw std::Command) don't hit ENOEXEC
      # ("Exec format error") — cross/QEMU only auto-translates the test
      # harness, not children it forks, unless binfmt_misc is registered.
      - name: register binfmt (qemu) for aarch64 subprocess exec
        if: ${{ matrix.cross }}      # only the aarch64 cross leg, NOT x86_64-native
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: cargo test --target x86_64-musl (native, full package suite)
        if: ${{ matrix.musl_native }}
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: |
          ulimit -l 65536 || true
          cargo test --target ${{ matrix.target }} -p mnemonic-toolkit
      # Run the package test suite on aarch64-Linux under QEMU user-mode so the
      # md1/address golden vectors are OUTPUT-verified for the shipped aarch64
      # binary. `--skip mlock` drops the lib `mlock::tests::*` POSIX-syscall /
      # page-size gates; `--skip g1_` drops the `tests/mlock_unit.rs` G1.x
      # page-pinning integration gates (their fn names lack "mlock", so the
      # first filter misses them) — both untestable-meaningfully under
      # emulation. Every golden/integration test still runs. No
      # `--include-ignored`, so the `g2_*` fault-injection tests stay skipped.
      - name: cross test --target aarch64-musl (QEMU; output goldens, mlock skipped)
        if: ${{ matrix.cross }}
        run: cross test --release --target ${{ matrix.target }} -p mnemonic-toolkit -- --skip mlock --skip g1_
