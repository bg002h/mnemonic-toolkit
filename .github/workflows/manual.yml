name: manual

# `paths` filters apply only to branch pushes / PRs; tag pushes
# matching `manual-v*` always trigger the workflow regardless of
# which files are in the tag's commit. This is intentional — the
# release-asset upload step needs to run on every tag push.

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/manual/**'
      - 'docs/tools/render-mermaid-cache.py'
    tags:
      - 'manual-v*'
  pull_request:
    paths:
      - 'docs/manual/**'
      - 'docs/tools/render-mermaid-cache.py'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      # Two render modes:
      #   on   = mermaid-filter + Chromium (status-quo path).
      #   skip = our pandoc Lua cache filter + checked-in PDFs (chromium-less).
      # The skip-mode leg actively removes chromium before building, proving
      # the cache is sufficient for build hosts without Puppeteer/Chromium.
      fail-fast: false
      matrix:
        cache_mode: [on, skip]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pandoc + texlive + chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-extra-utils \
            chromium-browser \
            make

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm tools (mermaid-filter, lints)
        run: |
          npm install -g \
            @mermaid-js/mermaid-cli@^11 \
            mermaid-filter@^1 \
            markdownlint-cli2@^0.13 \
            cspell@^8

      - name: Install lychee
        run: |
          LARCH=x86_64-unknown-linux-gnu
          curl -fsSL "https://github.com/lycheeverse/lychee/releases/download/lychee-v0.24.2/lychee-${LARCH}.tar.gz" \
            | sudo tar -xz --strip-components=1 -C /usr/local/bin "lychee-${LARCH}/lychee"
          sudo chmod +x /usr/local/bin/lychee

      - name: Install mk-cli
        # Use package-name selector (`mk-cli`) instead of `--bin mk`: the
        # mnemonic-key workspace ships multiple binaries (mk-codec's
        # gen_mk_vectors + mk-cli's mk), and cargo refuses --bin disambig
        # against a multi-binary workspace.
        run: cargo install --git https://github.com/bg002h/mnemonic-key --tag mk-cli-v0.2.0 mk-cli

      - name: Remove chromium for cache-mode test
        # Chromium-less proof: skip-mode must build without any Chromium
        # binary on PATH. Covers apt's chromium-browser, the snap'd binary
        # under /snap/bin/chromium, and pre-installed Chrome variants.
        if: matrix.cache_mode == 'skip'
        run: |
          sudo apt-get remove -y --purge chromium chromium-browser \
            google-chrome-stable chromium-snap 2>/dev/null || true
          sudo snap remove chromium 2>/dev/null || true
          sudo rm -rf /opt/google /opt/microsoft
          if which chromium chrome google-chrome 2>/dev/null; then
            echo "chromium still on PATH; cache-mode test invalid"; exit 1
          fi

      - name: Lint manual
        # Lint is render-mode-independent; run only on the on-mode leg to
        # avoid doubling CI time. The figures-cache-verify gate (part of
        # `make lint`) checks source-block ↔ cache-entry consistency, which
        # is independent of which mermaid filter is active.
        if: matrix.cache_mode == 'on'
        working-directory: docs/manual
        run: make lint MNEMONIC_BIN=true MD_BIN=true MS_BIN=true MK_BIN=mk

      - name: Build PDF
        working-directory: docs/manual
        run: make pdf MERMAID_FILTER=${{ matrix.cache_mode }}

      - name: Verify PDF
        working-directory: docs/manual
        run: test -f build/m-format-manual.pdf && ls -lh build/m-format-manual.pdf

      - name: Upload PDF as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: m-format-manual-pdf-${{ matrix.cache_mode }}
          path: docs/manual/build/m-format-manual.pdf

      - name: Ensure GitHub release exists for this tag
        # Release upload runs on the SKIP-mode leg only — that build embeds
        # all 9 mermaid diagrams correctly via the cache filter. The on-mode
        # leg silently drops mermaid blocks via a long-standing bug in
        # mermaid-filter's emission path (see docs/quickstart/FOLLOWUPS.md
        # closed entry `mermaid-block-silently-dropped-from-pdf`). The
        # on-mode leg still runs as a regression check + chromium-install
        # smoke-test, but its PDF is artifact-only, not shipped.
        if: matrix.cache_mode == 'skip' && startsWith(github.ref, 'refs/tags/manual-v')
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$REF_NAME" >/dev/null 2>&1; then
            gh release create "$REF_NAME" --title "$REF_NAME" --generate-notes
          fi

      - name: Upload PDF to release (on manual-v* tag)
        if: matrix.cache_mode == 'skip' && startsWith(github.ref, 'refs/tags/manual-v')
        env:
          REF_NAME: ${{ github.ref_name }}
        working-directory: docs/manual
        run: gh release upload "$REF_NAME" build/m-format-manual.pdf --clobber
