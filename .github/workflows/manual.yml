name: manual

# `paths` filters apply only to branch pushes / PRs; tag pushes
# matching `manual-v*` always trigger the workflow regardless of
# which files are in the tag's commit. This is intentional — the
# release-asset upload step needs to run on every tag push.

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/manual/**'
      - 'docs/tools/render-mermaid-cache.py'
      - '.github/workflows/manual.yml'
    tags:
      - 'manual-v*'
  pull_request:
    paths:
      - 'docs/manual/**'
      - 'docs/tools/render-mermaid-cache.py'
      - '.github/workflows/manual.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pandoc + texlive
        # No chromium (and no mermaid-filter / mermaid-cli below): the
        # build runs MERMAID_FILTER=skip and consumes the checked-in
        # figures/cache/ PDFs. See `ci-chromium-drop` (closed) in
        # docs/manual/FOLLOWUPS.md for the migration record.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-extra-utils \
            make

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install npm tools (lints only)
        # mermaid-filter / mermaid-cli intentionally absent — the cache
        # is checked into git; CI never regenerates it. Contributors who
        # need to regen the cache install mmdc + chromium locally.
        run: |
          npm install -g \
            markdownlint-cli2@^0.13 \
            cspell@^8

      - name: Install lychee
        run: |
          LARCH=x86_64-unknown-linux-gnu
          curl -fsSL "https://github.com/lycheeverse/lychee/releases/download/lychee-v0.24.2/lychee-${LARCH}.tar.gz" \
            | sudo tar -xz --strip-components=1 -C /usr/local/bin "lychee-${LARCH}/lychee"
          sudo chmod +x /usr/local/bin/lychee

      - name: Install mk-cli
        # Use package-name selector (`mk-cli`) instead of `--bin mk`: the
        # mnemonic-key workspace ships multiple binaries (mk-codec's
        # gen_mk_vectors + mk-cli's mk), and cargo refuses --bin disambig
        # against a multi-binary workspace.
        run: cargo install --git https://github.com/bg002h/mnemonic-key --tag mk-cli-v0.7.0 mk-cli

      - name: Install md-cli
        # Mirrors the mk-cli install pattern above. Use package-name
        # selector (`md-cli`) instead of `--bin md`: the descriptor-mnemonic
        # workspace ships multiple binaries. The `--features cli-compiler`
        # flag matches scripts/install.sh:35's component_info pin.
        run: cargo install --git https://github.com/bg002h/descriptor-mnemonic --tag descriptor-mnemonic-md-cli-v0.6.2 md-cli --features cli-compiler

      - name: Install ms-cli
        # Mirrors the mk-cli + md-cli install patterns above.
        run: cargo install --git https://github.com/bg002h/mnemonic-secret --tag ms-cli-v0.7.0 ms-cli

      - name: Build mnemonic binary (debug)
        # Debug binary is sufficient for transcript-replay byte-comparison.
        # Behavior under test is identical between debug/release modulo
        # panic-handler verbosity; mnemonic never panics in normal flow.
        run: cargo build --bin mnemonic

      - name: Audit manual (lint + verify-examples with real mnemonic binary)
        working-directory: docs/manual
        # All flag values below are constants or controlled built-ins
        # ($GITHUB_WORKSPACE); no untrusted github.event.* fields per
        # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/.
        run: |
          make audit \
            MNEMONIC_BIN="$GITHUB_WORKSPACE/target/debug/mnemonic" \
            MD_BIN=md \
            MS_BIN=ms \
            MK_BIN=mk \
            FIXTURES_DIR="$GITHUB_WORKSPACE/crates/mnemonic-toolkit/tests/fixtures/wallet_import"

      - name: Build PDF
        # MERMAID_FILTER=skip is the Makefile default; explicit here for
        # clarity. The build consumes the checked-in figures/cache/.
        working-directory: docs/manual
        run: make pdf MERMAID_FILTER=skip

      - name: Verify PDF
        working-directory: docs/manual
        run: test -f build/m-format-manual.pdf && ls -lh build/m-format-manual.pdf

      - name: Upload PDF as workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: m-format-manual-pdf
          path: docs/manual/build/m-format-manual.pdf

      - name: Ensure GitHub release exists for this tag
        if: startsWith(github.ref, 'refs/tags/manual-v')
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$REF_NAME" >/dev/null 2>&1; then
            gh release create "$REF_NAME" --title "$REF_NAME" --generate-notes
          fi

      - name: Upload PDF to release (on manual-v* tag)
        if: startsWith(github.ref, 'refs/tags/manual-v')
        env:
          REF_NAME: ${{ github.ref_name }}
        working-directory: docs/manual
        run: gh release upload "$REF_NAME" build/m-format-manual.pdf --clobber
