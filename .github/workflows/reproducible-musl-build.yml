name: reproducible-musl-build

# Reusable (`workflow_call`) workflow — the centralized recipe for the
# reproducible-builds-musl cycle (task #23). F6: homed in mnemonic-toolkit,
# callable by the codec CLI repos (md/ms/mk) once cross-repo workflow_call
# wiring lands in P3.
#
# ── P0+P1 SCOPE ─────────────────────────────────────────────────────────────
# P0 stood up: the digest-pinned container (Dockerfile.repro), the committed
# INERT vendor/ tree, and the `repro-substrate` validation job.
#
# P1 adds (this file):
#   * build-container       — builds Dockerfile.repro, pushes to GHCR, and
#                             RESOLVES the BUILT-DIGEST (job output consumed by
#                             every downstream job + by man-pages.yml's re-home).
#   * repro-x86_64-musl     — the reproducibility GATE: two-path double-build +
#                             cc-under-musl validation + gzip-residue. All eight
#                             §5 acceptance criteria.
# P2 adds (this file):
#   * repro-aarch64-musl    — the aarch64 reproducibility GATE, built via `cross`
#                             under QEMU using cross's DIGEST-PINNED bundled
#                             toolchain (Cross.toml). RE-VALIDATES the aarch64
#                             musl-gcc determinism independently (a DIFFERENT
#                             compiler than x86_64's; P1's result does not
#                             transfer) with DIRECT residue/.comment assertions
#                             as the primary evidence (cross A/B is weak — both
#                             legs collapse to cross's internal /project mount).
#                             Gated by the `run_aarch64` input (default true).
# The codec calls (P3) and the drift gate (P4) land later.
#
# ── HOW BUILT-DIGEST IS RESOLVED (the container-provenance model) ────────────
# `build-container` runs `docker build -f Dockerfile.repro`, pushes the layered
# image to GHCR (ghcr.io/<owner>/repro-musl), then reads the pushed manifest
# digest with `docker buildx imagetools inspect` / `docker inspect` and emits it
# as `outputs.image` = ghcr.io/<owner>/repro-musl@sha256:<BUILT-DIGEST>. Every
# downstream job — and the re-homed release build in man-pages.yml — consumes
# the image BY THAT DIGEST (`docker pull @sha256:…`), never the floating tag.
# This is the published source of truth: external rebuilders `docker pull` the
# same digest rather than rebuild Dockerfile.repro from apt (whose transitive
# musl-tools deps are NOT pinned by the base digest). The apt-pin minor is
# therefore resolved BY the built-image-by-digest model (primary); the
# snapshot.debian.org recipe in Dockerfile.repro remains the from-source
# fallback only.
#
# ── THE JOB-SCOPED [source] ACTIVATION (copy-exact — brainstorm §3.12/§4/F4) ─
# ALL THREE `cargo vendor`-emitted [source] blocks are MANDATORY (R0-r5-C1).
# The two-block form (crates-io + vendored-sources, dropping the git-fork
# `source."git+…rev=95fdd1c5…"` block) FAILS `--offline`: the miniscript
# `[patch.crates-io]` git dep has its OWN `git+…?rev=…` source key not served
# by `source.crates-io`, so cargo reaches the LIVE github host and errors
# `can't checkout … offline mode`. Empirically verified on cargo 1.85.0
# (POSITIVE 3-block → exit 0; NEGATIVE 2-block → exit 101). The single source of
# truth for the build command + remap is ci/repro/double-build.sh; this workflow
# only sets the fixed-path env and invokes those scripts.

on:
  workflow_call:
    inputs:
      target:
        description: "Rust target triple to resolve/build (musl)."
        type: string
        required: false
        default: x86_64-unknown-linux-musl
      arch:
        description: "Short arch label (x86_64 / aarch64) for artifact naming."
        type: string
        required: false
        default: x86_64
      crate:
        description: "Workspace package to build."
        type: string
        required: false
        default: mnemonic-toolkit
      bin:
        description: "Binary target to build."
        type: string
        required: false
        default: mnemonic
      cross_image:
        description: >-
          The digest-pinned `cross` runtime image for the aarch64 leg (P2):
          ghcr.io/cross-rs/aarch64-unknown-linux-musl@sha256:<CROSS-DIGEST>.
          Informational only — the canonical pin is committed in Cross.toml
          (which cross reads from the build CWD); cross does NOT consume this
          input. Retained for the verify-doc provenance tuple.
        type: string
        required: false
        default: ""
      run_aarch64:
        description: >-
          Run the slow (~30-60min, QEMU) aarch64-musl reproducibility gate
          (repro-aarch64-musl). Default true so the gate is active; a caller may
          set false to run the x86_64 gate alone (e.g. a fast iteration).
        type: boolean
        required: false
        default: true
      miniscript_rev:
        description: >-
          The miniscript [patch.crates-io] git-fork rev that keys the THIRD
          [source] block (P3a). The TOOLKIT depends on the fork → its default
          rev yields the THREE-block --config form (git-fork stanza MANDATORY:
          the two-block form FAILS --offline because the fork's git+…?rev=…
          source key is not served by source.crates-io). A CODEC CLI (md/ms/mk)
          does NOT depend on the fork → it passes "" (EMPTY) to select the
          TWO-block form (crates-io + vendored-sources only). Threaded to the
          gate scripts as MINISCRIPT_REV (single-dash default ⇒ explicit empty
          is honored as the two-block selector).
        type: string
        required: false
        default: "95fdd1c5773bd918c574d2225787973f63e16a66"
      toolkit_ref:
        description: >-
          The mnemonic-toolkit ref (SHA/tag/branch) to source the centralized
          recipe from — Dockerfile.repro, ci/repro/*.sh, Cross.toml (F6: ONE
          source of truth). A CODEC caller's own actions/checkout has only the
          codec; each job that needs the recipe does a SECOND checkout of
          bg002h/mnemonic-toolkit at this ref (public repo ⇒ default
          GITHUB_TOKEN suffices, no PAT). The TOOLKIT's own call passes its own
          HEAD SHA so the recipe is sourced from the exact same commit it
          checks out as the crate source (byte-unchanged build).
        type: string
        required: false
        default: ""
    outputs:
      image:
        description: "The BUILT, digest-pinned repro container (ghcr.io/<owner>/repro-musl@sha256:<BUILT-DIGEST>)."
        value: ${{ jobs.build-container.outputs.image }}
  # Manual trigger — lets the WHOLE pipeline (build-container → gates) be
  # exercised on a throwaway tag/branch BEFORE a real release relies on it.
  # Same inputs as workflow_call, sensibly defaulted so a bare "Run workflow"
  # click drives the x86_64-musl `mnemonic` POC end-to-end.
  workflow_dispatch:
    inputs:
      target:
        description: "Rust target triple to resolve/build (musl)."
        type: string
        required: false
        default: x86_64-unknown-linux-musl
      arch:
        description: "Short arch label (x86_64 / aarch64) for artifact naming."
        type: string
        required: false
        default: x86_64
      crate:
        description: "Workspace package to build."
        type: string
        required: false
        default: mnemonic-toolkit
      bin:
        description: "Binary target to build."
        type: string
        required: false
        default: mnemonic
      cross_image:
        description: >-
          The digest-pinned `cross` runtime image for the aarch64 leg (P2).
          Informational only — the canonical pin is committed in Cross.toml.
        type: string
        required: false
        default: ""
      run_aarch64:
        description: >-
          Run the slow (~30-60min, QEMU) aarch64-musl reproducibility gate.
        type: boolean
        required: false
        default: true
      miniscript_rev:
        description: >-
          miniscript fork rev keying the THIRD [source] block. Default ⇒ the
          toolkit THREE-block form. Set "" (empty) ⇒ codec TWO-block form.
        type: string
        required: false
        default: "95fdd1c5773bd918c574d2225787973f63e16a66"
      toolkit_ref:
        description: >-
          mnemonic-toolkit ref to source the centralized recipe
          (Dockerfile.repro / ci/repro/*.sh / Cross.toml) from. Empty ⇒ the
          workflow's own ref (HEAD on a dispatch).
        type: string
        required: false
        default: ""

permissions:
  contents: read

# The repro-substrate / repro-x86_64-musl gate jobs run with job-level
# `container:`; GitHub executes inline `run:` blocks under the container's
# /bin/sh (dash), which rejects `set -euxo pipefail` (`set: Illegal option`).
# Force bash (present in the Debian-based repro image) for all run blocks.
defaults:
  run:
    shell: bash

jobs:
  # ── build + push the repro container, RESOLVE the BUILT-DIGEST ──────────────
  # Builds Dockerfile.repro, pushes to GHCR, and emits the image BY DIGEST so
  # every downstream job (and man-pages.yml's re-homed release build) consume
  # the EXACT same hermetic environment. The published digest is the source of
  # truth a rebuilder `docker pull`s (verify-reproducibility.md).
  build-container:
    name: build-container (resolve BUILT-DIGEST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.digest.outputs.image }}
    steps:
      # Source the centralized recipe (Dockerfile.repro) from the toolkit (F6).
      # For the TOOLKIT's own call this is its own HEAD SHA; for a CODEC caller
      # it is the pinned toolkit ref the caller passes. Dockerfile.repro has NO
      # COPY/ADD — its build context is irrelevant to the built image — so
      # building from the `toolkit` dir yields the byte-identical image the
      # toolkit's pre-P3a `.`-context build produced.
      - name: Checkout the toolkit recipe (Dockerfile.repro)
        uses: actions/checkout@v4
        with:
          repository: bg002h/mnemonic-toolkit
          ref: ${{ inputs.toolkit_ref || github.sha }}
          path: toolkit

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

      - name: Build + push the repro container
        id: build
        run: |
          set -euxo pipefail
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          # PER-REPO package name: a calling repo's GITHUB_TOKEN can only push to
          # packages owned by ITS repo, so a shared toolkit-owned `repro-musl` is
          # denied (write_package) for codec callers. Suffix with the caller repo
          # name so each repo pushes/owns its own `repro-musl-<repo>` package. The
          # image content is identical (same digest-pinned Dockerfile) so
          # reproducibility is preserved; only the package namespace differs.
          reponame="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          pkg="repro-musl-${reponame}"
          repo="ghcr.io/${owner}/${pkg}"
          # Tag with the Dockerfile content hash so a re-run reuses the digest
          # iff the Dockerfile is unchanged (the image content is what matters;
          # the consumed reference is the digest, not the tag).
          tag="$(sha256sum toolkit/Dockerfile.repro | cut -c1-16)"
          docker build -f toolkit/Dockerfile.repro -t "${repo}:${tag}" toolkit
          docker push "${repo}:${tag}"
          echo "repo=${repo}" >> "$GITHUB_OUTPUT"
          echo "pkg=${pkg}"   >> "$GITHUB_OUTPUT"
          echo "tag=${tag}"   >> "$GITHUB_OUTPUT"

      - name: Resolve the pushed digest
        id: digest
        run: |
          set -euxo pipefail
          repo="${{ steps.build.outputs.repo }}"
          tag="${{ steps.build.outputs.tag }}"
          # The pushed manifest digest (sha256) — the BUILT-DIGEST.
          digest="$(docker buildx imagetools inspect "${repo}:${tag}" \
                      --format '{{.Manifest.Digest}}')"
          image="${repo}@${digest}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "Resolved BUILT image by digest: ${image}"

      # ── Make the GHCR package PUBLIC (best-effort) ──────────────────────────
      # GHCR container packages are PRIVATE by default. The chosen provenance
      # model (verify-reproducibility.md §3) REQUIRES the image to be PUBLIC so
      # an EXTERNAL rebuilder can `docker pull <repo>@sha256:<digest>` without a
      # token. This PATCHes the package visibility to public via `gh api`.
      #
      # ⚠️ ONE-TIME MANUAL SETUP MAY BE REQUIRED. The default `GITHUB_TOKEN`
      # often LACKS the scope to flip package visibility (user-vs-org packages,
      # and the org-package-creation policy both gate it). This call is therefore
      # `|| true` — it MUST NOT hard-fail the build. If it cannot self-promote,
      # an admin must set the `repro-musl` package's visibility to **Public**
      # ONCE by hand: GitHub → (user/org) → Packages → repro-musl → Package
      # settings → Danger Zone → Change visibility → Public. After that one-time
      # flip the package stays public and external `docker pull @sha256` works.
      - name: Make the repro container GHCR package public (best-effort)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          OWNER_TYPE: ${{ github.event.repository.owner.type }}
          PKG: ${{ steps.build.outputs.pkg }}
        run: |
          set -uxo pipefail
          # User-owned vs org-owned packages live at different API paths.
          if [ "$OWNER_TYPE" = "Organization" ]; then
            gh api -X PATCH \
              "/orgs/${OWNER}/packages/container/${PKG}/visibility" \
              -f visibility=public || true
          else
            gh api -X PATCH \
              "/user/packages/container/${PKG}/visibility" \
              -f visibility=public || true
          fi
          echo "Attempted to set ${PKG} visibility=public (best-effort; see step note if it failed)."

  # ── P0 GATE (carried): committed INERT vendor/ resolves a FULLY OFFLINE build─
  # in the digest-pinned container, activated job-scoped via the --config
  # overrides. PASS iff it builds with no network; the negative sub-check MUST
  # RED. Now runs INSIDE the BUILT-DIGEST container resolved above.
  #
  # PARAMETERIZED (P3a): the POSITIVE build + the NEGATIVE sub-check construct
  # SRC_CONFIG in-shell keyed off MINISCRIPT_REV — THREE-block for the toolkit
  # (default rev) / TWO-block for a codec (empty rev) — exactly mirroring the
  # gate scripts (ci/repro/*.sh). The NEGATIVE check keeps EVERY block EXCEPT
  # `source.vendored-sources.directory` (which it always drops), so it stays the
  # directory-isolation test under both shapes.
  repro-substrate:
    name: repro-substrate (${{ inputs.target }})
    needs: build-container
    runs-on: ubuntu-latest
    # `packages: read` + container registry creds: the BUILT image lives in
    # GHCR (private-by-default), so the runner MUST authenticate to pull it
    # for the job-level `container:`. Without this the gate falsely REDs on a
    # pull failure. (Job-level container ⇒ use container.credentials, not a
    # per-step `docker login`.)
    permissions:
      contents: read
      packages: read
    container:
      image: ${{ needs.build-container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      # Trusted reusable-workflow inputs routed through env (not interpolated
      # into the run: shell) so the in-shell SRC_CONFIG construction is safe.
      CRATE: ${{ inputs.crate }}
      BIN: ${{ inputs.bin }}
      TARGET: ${{ inputs.target }}
      MINISCRIPT_REV: ${{ inputs.miniscript_rev }}
    steps:
      - uses: actions/checkout@v4

      # ── POSITIVE: --config offline build resolves from vendor/ ──────────────
      # PASS iff this builds with NO network. Proves (a) the committed vendor/
      # tree is complete, (b) the job-scoped --config overrides activate vendor/
      # (INCLUDING the git-fork stanza for the toolkit's three-block form), (c)
      # the digest-pinned container carries a working musl-gcc.
      - name: repro-substrate-positive (--config, --offline)
        env:
          CARGO_HOME: /cargo
        run: |
          set -euxo pipefail
          # Build SRC_CONFIG: TWO-block when MINISCRIPT_REV is empty (codec),
          # THREE-block (add the git-fork stanza) when set (toolkit). Mirrors
          # ci/repro/double-build.sh exactly.
          SRC_CONFIG=( --config 'source.crates-io.replace-with="vendored-sources"' )
          if [ -n "$MINISCRIPT_REV" ]; then
            SRC_CONFIG+=(
              --config "source.\"git+https://github.com/rust-bitcoin/rust-miniscript?rev=${MINISCRIPT_REV}\".git=\"https://github.com/rust-bitcoin/rust-miniscript\""
              --config "source.\"git+https://github.com/rust-bitcoin/rust-miniscript?rev=${MINISCRIPT_REV}\".rev=\"${MINISCRIPT_REV}\""
              --config "source.\"git+https://github.com/rust-bitcoin/rust-miniscript?rev=${MINISCRIPT_REV}\".replace-with=\"vendored-sources\""
            )
          fi
          SRC_CONFIG+=( --config 'source.vendored-sources.directory="vendor"' )
          cargo build --locked --offline \
            -p "$CRATE" --bin "$BIN" \
            --target "$TARGET" \
            "${SRC_CONFIG[@]}"

      # ── NEGATIVE sub-check (TDD) — ISOLATES the directory block (deliverable ─
      # #8 / plan's literal intent). KEEP every OTHER block (crates-io
      # .replace-with + — for the toolkit — the 3 git blocks), drop ONLY
      # `source.vendored-sources.directory`. With every other block present,
      # dropping just the directory leaves the replace-with redirects pointing at
      # a `vendored-sources` source that has no directory → cargo cannot resolve
      # `--offline` → MUST RED. Branches on MINISCRIPT_REV identically to the
      # POSITIVE check (two-block negative = keep crates-io.replace-with, drop
      # vendored-sources.directory). No filesystem mutation — vendor/ still
      # exists; the directory pointer is simply absent.
      - name: repro-substrate-negative (dropped vendored-sources.directory MUST RED)
        env:
          CARGO_HOME: /cargo
        run: |
          set -uxo pipefail
          NEG_CONFIG=( --config 'source.crates-io.replace-with="vendored-sources"' )
          if [ -n "$MINISCRIPT_REV" ]; then
            NEG_CONFIG+=(
              --config "source.\"git+https://github.com/rust-bitcoin/rust-miniscript?rev=${MINISCRIPT_REV}\".git=\"https://github.com/rust-bitcoin/rust-miniscript\""
              --config "source.\"git+https://github.com/rust-bitcoin/rust-miniscript?rev=${MINISCRIPT_REV}\".rev=\"${MINISCRIPT_REV}\""
              --config "source.\"git+https://github.com/rust-bitcoin/rust-miniscript?rev=${MINISCRIPT_REV}\".replace-with=\"vendored-sources\""
            )
          fi
          # NOTE: source.vendored-sources.directory is DELIBERATELY omitted.
          if cargo build --locked --offline \
               -p "$CRATE" --bin "$BIN" \
               --target "$TARGET" \
               "${NEG_CONFIG[@]}"; then
            echo "::error::NEGATIVE sub-check FAILED — build SUCCEEDED without the vendored-sources.directory activation; the directory block is not being shown load-bearing."
            exit 1
          fi
          echo "NEGATIVE sub-check OK — build RED as expected (vendored-sources has no directory → unresolvable offline)."

  # ── P1 GATE: reproducibility proof for x86_64-musl `mnemonic` ───────────────
  # In the BUILT-DIGEST container, materialize the source at TWO DISTINCT paths
  # (/build-a/src, /build-b/src — both remapped to /build) and run the gate
  # scripts. Asserts all eight §5 acceptance criteria. Network is allowed for
  # checkout only; the builds are `--offline` against committed vendor/.
  repro-x86_64-musl:
    name: repro-x86_64-musl (${{ inputs.target }})
    needs: build-container
    runs-on: ubuntu-latest
    # `packages: read` + container registry creds to pull the private-by-default
    # GHCR BUILT image for this job-level `container:` (see repro-substrate).
    permissions:
      contents: read
      packages: read
    container:
      image: ${{ needs.build-container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      TARGET: ${{ inputs.target }}
      CRATE: ${{ inputs.crate }}
      BIN: ${{ inputs.bin }}
      ARCH: ${{ inputs.arch }}
      CARGO_HOME: /cargo
      LC_ALL: C
      TZ: UTC
      # The gate scripts (toolkit/ci/repro/*.sh) read MINISCRIPT_REV from env:
      # set (toolkit default) ⇒ THREE-block --config; empty (codec) ⇒ TWO-block.
      MINISCRIPT_REV: ${{ inputs.miniscript_rev }}
    steps:
      # The CALLER's checkout (path: src) provides the crate source + the
      # committed vendor/ tree the --offline build resolves against.
      - uses: actions/checkout@v4
        with:
          path: src

      # The centralized recipe (ci/repro/*.sh, Cross.toml) lives in the toolkit
      # (F6). A codec caller's `src` does not carry it, so source it from the
      # toolkit at the caller-pinned ref. For the toolkit's own call this is its
      # own HEAD SHA (identical content to `src`), so the build is byte-unchanged.
      - name: Checkout the toolkit recipe (ci/repro/*.sh)
        uses: actions/checkout@v4
        with:
          repository: bg002h/mnemonic-toolkit
          ref: ${{ inputs.toolkit_ref || github.sha }}
          path: toolkit

      - name: Resolve the pinned SOURCE_DATE_EPOCH (off the COMMIT SHA)
        id: epoch
        run: |
          set -euxo pipefail
          # Cheap insurance against git "dubious ownership" inside the container
          # job (the checkout lands at ./src; mark it safe before any git op).
          git config --global --add safe.directory "$PWD/src"
          # Keyed off the COMMIT SHA, not the tag name (R0-r2-I2). On a PR build
          # this is HEAD; on a release re-home it is the tagged commit.
          epoch="$(git -C src show -s --format=%ct HEAD)"
          echo "epoch=${epoch}" >> "$GITHUB_OUTPUT"
          echo "SOURCE_DATE_EPOCH=${epoch}"

      - name: Materialize source at two DISTINCT paths (/build-a/src, /build-b/src)
        run: |
          set -euxo pipefail
          mkdir -p /build-a /build-b
          cp -a src/. /build-a/src
          cp -a src/. /build-b/src

      # TDD: this is the test. Against an un-remapped baseline it REDs (binaries
      # differ at byte ~41). The recipe (the remap inside double-build.sh) GREENs
      # it. Acceptance (i)/(ii)/(iii): binary + .tar.gz + libsecp .o identical.
      - name: double-build (two distinct paths → byte-identical)
        env:
          SOURCE_DATE_EPOCH: ${{ steps.epoch.outputs.epoch }}
          REPRO_OUT_DIR: /build/canonical
        run: |
          set -euxo pipefail
          bash toolkit/ci/repro/double-build.sh /build-a/src /build-b/src

      # Acceptance (iv)/(v): epoch load-bearing under musl-gcc + zero residue.
      - name: cc-validate (epoch load-bearing + residue grep)
        env:
          SOURCE_DATE_EPOCH: ${{ steps.epoch.outputs.epoch }}
        run: |
          set -euxo pipefail
          bash toolkit/ci/repro/cc-validate.sh /build-a/src

      # REMAP-OFF NEGATIVE (P4) — proves --remap-path-prefix is LOAD-BEARING, not
      # hollow. The positive double-build above proves byte-IDENTITY *with* the
      # remap; this proves the two no-remap binaries DIFFER *without* it (the
      # absolute build-path leak in .rodata returns across the two distinct paths).
      # If a no-remap build were ALSO reproducible, the remap is a no-op and this
      # step REDs — alerting that the positive gate's GREEN is no longer evidence
      # the remap works (R0-r3-I1 / brainstorm §P4 remap-off negative). Runs in the
      # SAME container at the SAME two trees; the canonical artifact (/build/canonical)
      # was already copied out by the positive gate, so this rebuild does not
      # perturb it. BUILDER defaults to cargo (x86_64) ⇒ the A/B-DIFFER assertion.
      - name: remap-off NEGATIVE (no-remap build MUST differ / leak ⇒ remap proven load-bearing)
        env:
          SOURCE_DATE_EPOCH: ${{ steps.epoch.outputs.epoch }}
        run: |
          set -euxo pipefail
          bash toolkit/ci/repro/remap-off-negative.sh /build-a/src /build-b/src

      # Acceptance (vi): gzip header mtime zero + OS byte pinned.
      - name: gzip-residue (mtime zero + OS byte pinned)
        run: |
          set -euxo pipefail
          bash toolkit/ci/repro/gzip-residue.sh \
            /build/canonical/${{ inputs.bin }}-0.0.0-repro-${{ inputs.arch }}-linux-musl.tar.gz 03

      # Acceptance (vii): the binary still runs.
      - name: binary runs (--version)
        run: |
          set -euxo pipefail
          /build/canonical/${{ inputs.bin }} --version

      # Acceptance (viii): the committed config + workflow env COMPILE the
      # release target with the CORRECT top-level --remap-path-prefix flag form
      # (a -Cremap typo would error `unknown codegen option` — explicit guard so
      # it cannot reach the verify doc, R0-C1). double-build already compiled
      # with the remap; assert the flag form is the top-level one here.
      - name: assert top-level --remap-path-prefix flag form
        run: |
          set -euxo pipefail
          # The remap MUST be the top-level flag (no -C). Grep the gate script.
          if grep -nE '\-Cremap-path-prefix' toolkit/ci/repro/double-build.sh; then
            echo "::error::-Cremap-path-prefix found — that errors 'unknown codegen option' on 1.85.0; use the top-level --remap-path-prefix (R0-C1)." >&2
            exit 1
          fi
          grep -nE '\-\-remap-path-prefix=' toolkit/ci/repro/double-build.sh >/dev/null \
            || { echo "::error::no top-level --remap-path-prefix in the gate recipe." >&2; exit 1; }
          echo "OK: top-level --remap-path-prefix flag form confirmed."

  # ── P2 GATE: reproducibility proof for aarch64-musl `mnemonic` ──────────────
  # KEY DIFFERENCE FROM repro-x86_64-musl. There is NO native aarch64 runner, so
  # the build runs via `cross` under QEMU. `cross` itself spawns a QEMU container
  # (its DIGEST-PINNED runtime image, Cross.toml) and forwards the --config
  # [source] overrides + the Cross.toml [build.env] passthrough vars into it.
  # cross needs Docker on the HOST → this job runs on a bare `ubuntu-latest`
  # runner with NO job-level `container:` (that would be docker-in-docker). The
  # aarch64 build is SLOW under emulation (~30-60min); that is expected for a
  # gate. cross reads Cross.toml from the build CWD (/build-a/src, /build-b/src),
  # where the CALLER's committed Cross.toml is present (cp -a src/. includes it).
  # The Cross.toml is therefore the CALLER's (per-repo cross image / passthrough);
  # only the gate SCRIPTS come from the toolkit checkout (toolkit/ci/repro/*.sh).
  #
  # The aarch64 cross musl-gcc is a DIFFERENT, separately-versioned compiler than
  # the x86_64 leg's apt musl-gcc — so its determinism is RE-VALIDATED here from
  # scratch (P1's x86_64 cc result does NOT transfer). And because cross mounts
  # BOTH host paths to its fixed internal /project, A/B-equality is WEAK evidence
  # (both legs collapse to the same in-container path); the PRIMARY aarch64 gate
  # is cc-validate.sh's direct residue + .comment passthrough-effectiveness
  # assertions (R0-I2).
  #
  # CARGO_HOME is deliberately NOT set job-level: `cross` sets CARGO_HOME=/cargo
  # INSIDE its container, and the gate scripts default the remap literal to
  # /cargo (${CARGO_HOME:-/cargo}). Setting CARGO_HOME=/cargo on the HOST would
  # break the host `cargo install cross` step.
  repro-aarch64-musl:
    name: repro-aarch64-musl (aarch64-unknown-linux-musl)
    # NO `needs: build-container`: this leg builds via `cross` (its own
    # digest-pinned QEMU image, Cross.toml), NOT inside the build-container
    # image — so it is independent and starts in parallel (the ~30-60min QEMU
    # build should not wait on the container push).
    # Gated so a caller (workflow_dispatch checkbox, or a workflow_call `with:
    # run_aarch64: false`) can run the x86_64 gate alone. Default true ⇒ active.
    if: ${{ inputs.run_aarch64 }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TARGET: aarch64-unknown-linux-musl
      CRATE: ${{ inputs.crate }}
      BIN: ${{ inputs.bin }}
      ARCH: aarch64
      LC_ALL: C
      TZ: UTC
      BUILDER: cross
      # The .comment substring proving the digest-pinned cross toolchain is the
      # compiler in use (R0-I2 — PRIMARY aarch64 evidence). cross's
      # aarch64-unknown-linux-musl image bundles a GCC cross-toolchain; its
      # libsecp .o `.comment` carries a "GCC:" producer string. Asserting the
      # generic "GCC:" substring proves a GCC toolchain compiled it (vs a missing
      # /failed passthrough) without brittle-pinning a GCC point version that
      # would churn on every cross image bump (the IMAGE itself is digest-pinned
      # in Cross.toml — that is the real toolchain pin).
      CROSS_COMMENT_EXPECT: "GCC:"
      # set (toolkit default) ⇒ THREE-block --config; empty (codec) ⇒ TWO-block.
      MINISCRIPT_REV: ${{ inputs.miniscript_rev }}
    steps:
      # The CALLER's checkout (path: src) provides the crate source + the
      # committed vendor/ AND the caller's committed Cross.toml (cross reads it
      # from the build CWD, which is cp -a src/.).
      - uses: actions/checkout@v4
        with:
          path: src

      # Source ONLY the gate scripts from the toolkit (F6); Cross.toml stays the
      # caller's (above). For the toolkit's own call this is its own HEAD SHA.
      - name: Checkout the toolkit recipe (ci/repro/*.sh)
        uses: actions/checkout@v4
        with:
          repository: bg002h/mnemonic-toolkit
          ref: ${{ inputs.toolkit_ref || github.sha }}
          path: toolkit

      - name: install pinned rust toolchain + aarch64-musl target
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: aarch64-unknown-linux-musl

      # Register QEMU/binfmt_misc so `cross` can execute aarch64 binaries (and
      # any subprocesses the gate spawns, e.g. `mnemonic --version`) under
      # emulation — same mechanism as rust.yml's aarch64 cross-test leg.
      - name: register binfmt (qemu) for aarch64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: install cross
        run: cargo install --locked cross

      - name: Resolve the pinned SOURCE_DATE_EPOCH (off the COMMIT SHA)
        id: epoch
        run: |
          set -euxo pipefail
          git config --global --add safe.directory "$PWD/src"
          # Keyed off the COMMIT SHA, not the tag name (R0-r2-I2). HEAD on a PR
          # build; the tagged commit on a release re-home.
          epoch="$(git -C src show -s --format=%ct HEAD)"
          echo "epoch=${epoch}" >> "$GITHUB_OUTPUT"
          echo "SOURCE_DATE_EPOCH=${epoch}"

      # Two DISTINCT host paths (as for x86_64) — though cross collapses both to
      # its internal /project, the same materialization keeps the gate uniform.
      - name: Materialize source at two DISTINCT paths (/build-a/src, /build-b/src)
        run: |
          set -euxo pipefail
          sudo mkdir -p /build-a /build-b
          sudo chown "$USER" /build-a /build-b
          cp -a src/. /build-a/src
          cp -a src/. /build-b/src

      # double-build under cross/QEMU (BUILDER=cross). Acceptance (i)/(ii)/(iii):
      # binary + .tar.gz + libsecp .o byte-identical across the two legs. NOTE:
      # for aarch64 this A/B is weak (both legs → /project); the load-bearing
      # aarch64 proof is the cc-validate step below.
      - name: double-build under cross/QEMU (two distinct paths → byte-identical)
        env:
          SOURCE_DATE_EPOCH: ${{ steps.epoch.outputs.epoch }}
          REPRO_OUT_DIR: /build/canonical
        run: |
          set -euxo pipefail
          sudo mkdir -p /build/canonical
          sudo chown "$USER" /build /build/canonical
          bash toolkit/ci/repro/double-build.sh /build-a/src /build-b/src

      # PRIMARY aarch64 gate (R0-I2): epoch load-bearing-or-benign under the cross
      # toolchain + ZERO host-path/__DATE__ residue + the .comment proves the
      # digest-pinned cross toolchain is the compiler (CROSS_COMMENT_EXPECT).
      - name: cc-validate under cross (residue + .comment passthrough-effectiveness)
        env:
          SOURCE_DATE_EPOCH: ${{ steps.epoch.outputs.epoch }}
        run: |
          set -euxo pipefail
          bash toolkit/ci/repro/cc-validate.sh /build-a/src

      # REMAP-OFF NEGATIVE (P4), aarch64/cross variant. Under cross BOTH legs
      # collapse to the fixed /project mount, so an A/B-DIFFER assertion is
      # structurally unsatisfiable (the same reason A/B is weak aarch64 evidence,
      # R0-I2). The script is ARCH-AWARE: with BUILDER=cross (set job-level above)
      # it instead asserts the no-remap build LEAKS the /project host-path residue
      # that the remap + -ffile-prefix-map would strip — proving the remap is
      # load-bearing. Zero residue ⇒ the remap is hollow ⇒ this step REDs.
      - name: remap-off NEGATIVE under cross (no-remap build MUST leak /project ⇒ remap proven load-bearing)
        env:
          SOURCE_DATE_EPOCH: ${{ steps.epoch.outputs.epoch }}
        run: |
          set -euxo pipefail
          bash toolkit/ci/repro/remap-off-negative.sh /build-a/src /build-b/src

      # Acceptance (vi): gzip header mtime zero + OS byte pinned.
      - name: gzip-residue (mtime zero + OS byte pinned)
        run: |
          set -euxo pipefail
          bash toolkit/ci/repro/gzip-residue.sh \
            /build/canonical/${{ inputs.bin }}-0.0.0-repro-aarch64-linux-musl.tar.gz 03

      # Acceptance (vii): the aarch64 binary runs under QEMU user-mode emulation
      # (binfmt registered above). qemu-aarch64 is provided by the setup-qemu
      # binfmt registration; a bare exec of the aarch64 ELF is auto-translated.
      - name: binary runs under QEMU (--version)
        run: |
          set -euxo pipefail
          /build/canonical/${{ inputs.bin }} --version

      # Acceptance (viii): the gate recipe uses the CORRECT top-level
      # --remap-path-prefix flag form (no -C; R0-C1).
      - name: assert top-level --remap-path-prefix flag form
        run: |
          set -euxo pipefail
          if grep -nE '\-Cremap-path-prefix' toolkit/ci/repro/double-build.sh; then
            echo "::error::-Cremap-path-prefix found — that errors 'unknown codegen option' on 1.85.0; use the top-level --remap-path-prefix (R0-C1)." >&2
            exit 1
          fi
          grep -nE '\-\-remap-path-prefix=' toolkit/ci/repro/double-build.sh >/dev/null \
            || { echo "::error::no top-level --remap-path-prefix in the gate recipe." >&2; exit 1; }
          echo "OK: top-level --remap-path-prefix flag form confirmed."
